<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Pro Studio | V17 Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #10b981; 
            --bg: #0f172a; 
            --panel: #1e293b; 
            --border: #334155; 
            --handle-move: #3b82f6; 
            --handle-rotate: #f59e0b; 
            --error: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; background: var(--bg); color: white; font-family: 'Inter', sans-serif; }

        /* GİRİŞ EKRANI */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; outline: none; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; }

        /* ANA DÜZEN */
        #app-container { display: none; height: 100%; width: 100%; flex-direction: row; }
        #sidebar { width: 400px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; z-index: 100; overflow: hidden; }
        
        #main-view { flex: 1; background: #020617; overflow: hidden; position: relative; display: flex; }
        #zoom-container { flex: 1; display: flex; align-items: center; justify-content: center; transform-origin: center center; position: relative;}
        #svg-wrapper { position: relative; background: white; box-shadow: 0 0 50px black; touch-action: none; }

        /* SIDEBAR BÖLÜMLERİ */
        .sidebar-header { padding: 15px; background: #111827; border-bottom: 1px solid var(--border); }
        #layers-wrapper { height: 200px; border-bottom: 2px solid var(--border); overflow-y: auto; background: #0f172a; }
        #editor-fields { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; scrollbar-width: thin; }

        /* NESNE KONTROLLERİ */
        .handle { fill: white; stroke: var(--handle-move); stroke-width: 2; pointer-events: all; }
        .handle-rotate { fill: var(--handle-rotate); stroke: white; cursor: crosshair; }
        .duzenlenebilir { cursor: move; }
        .snap-line { stroke: #ec4899; stroke-width: 1; stroke-dasharray: 4,4; pointer-events: none; }

        /* UI ELEMANLARI */
        .action-btn { background: #334155; color: white; border: none; border-radius: 8px; padding: 10px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { background: #475569; }
        .action-btn.active { background: var(--accent); }
        .action-btn.special { background: #0284c7; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .label-text { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 13px; }

        /* COLLAPSIBLE */
        .collapsible-section { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .collapsible-header { background: #111827; padding: 10px; cursor: pointer; font-size: 11px; font-weight: bold; color: var(--accent); display: flex; justify-content: space-between; }

        /* FLOATING TOOLS */
        .floating-tools { position: absolute; bottom: 40px; left: 20px; background: var(--panel); padding: 8px; border-radius: 12px; display: flex; gap: 8px; z-index: 500; border: 1px solid var(--border); }
        
        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); color: white; text-align: center; padding: 8px; z-index: 11000; display: none; font-weight: bold; }

        @media (max-width: 1024px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; border-top: 1px solid var(--border); }
            #main-view { height: 50%; }
        }
    </style>
</head>
<body>

<div id="status-info">İşlem Yapılıyor...</div>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:white; margin-bottom:5px;">Pro Studio V17</h2>
        <p style="font-size:12px; color:#94a3b8; margin-bottom:20px;">UTF-8 & Hizalama Desteği</p>
        <input type="password" id="passInput" placeholder="Worker Şifresi">
        <button onclick="login()">Bağlan</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div class="floating-tools">
            <button class="action-btn" onclick="undo()">↩ Geri</button>
            <button class="action-btn" onclick="redo()">İleri ↪</button>
            <button class="action-btn" onclick="changeZoom(0.1)">+</button>
            <button class="action-btn" onclick="resetZoom()">100%</button>
            <button class="action-btn" onclick="changeZoom(-0.1)">-</button>
        </div>
        <div id="zoom-container">
            <div id="svg-wrapper">
                <div id="canvas-inner"></div>
                <svg id="control-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:visible;"></svg>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="grid-3" style="grid-template-columns: 1.5fr 1fr 1fr;">
                <button onclick="saveData()" class="action-btn active">💾 KAYDET</button>
                <button onclick="exportFile('png')" class="action-btn special">PNG</button>
                <button onclick="exportFile('svg')" class="action-btn" style="background:#ea580c">SVG</button>
            </div>
            <select id="file-selector" onchange="loadSlide()">
                <option value="slayt.svg">Ana Slayt</option>
                <option value="kampanya.svg">Kampanya</option>
            </select>
        </div>

        <div id="layers-wrapper"></div>

        <div id="editor-fields">
            <div style="text-align:center; padding:40px; color:#64748b; font-style:italic;">
                Düzenlemek için bir nesne seçin.
            </div>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev"; // Buraya kendi linkini koy
    let SESSION_PASS = "", SHA_KEY = "";
    let selectedEl = null, historyStack = [], historyIndex = -1;
    let currentZoom = 1, panX = 0, panY = 0;

    // --- UTF-8 GÜVENLİ BASE64 FONKSİYONLARI ---
    function utf8_to_b64(str) { return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1))); }
    function b64_to_utf8(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

    async function login() {
        SESSION_PASS = document.getElementById('passInput').value;
        if(!SESSION_PASS) return alert("Şifre girin!");
        await loadSlide();
    }

    async function loadSlide() {
        const file = document.getElementById('file-selector').value;
        showStatus("YÜKLENİYOR...");
        try {
            const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file} });
            if(res.status === 401) return alert("Yetkisiz!");
            
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";

            if(res.status === 404) {
                document.getElementById('canvas-inner').innerHTML = `<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg"><rect id="canvas-bg" width="1080" height="1080" fill="#ffffff"/></svg>`;
            } else {
                const data = await res.json();
                SHA_KEY = data.sha;
                document.getElementById('canvas-inner').innerHTML = b64_to_utf8(data.content);
            }
            initEditor();
            hideStatus();
        } catch(e) { alert("Bağlantı hatası!"); hideStatus(); }
    }

    function initEditor() {
        const svg = document.querySelector('#canvas-inner svg');
        svg.querySelectorAll('*').forEach(el => {
            if(el.id && !el.classList.contains('duzenlenebilir') && el.id !== 'canvas-bg') el.classList.add('duzenlenebilir');
        });
        saveState();
        renderLayers();
        attachEvents();
    }

    // --- HİZALAMA FONKSİYONLARI (YENİ) ---
    window.alignAction = function(type) {
        if(!selectedEl) return;
        const svg = document.querySelector('#canvas-inner svg');
        const vb = svg.viewBox.baseVal;
        let bbox = selectedEl.getBBox();
        
        const w = parseFloat(selectedEl.getAttribute('width')) || bbox.width;
        const h = parseFloat(selectedEl.getAttribute('height')) || bbox.height;

        if(type === 'left') selectedEl.setAttribute('x', 0);
        if(type === 'center-h') selectedEl.setAttribute('x', (vb.width - w) / 2);
        if(type === 'right') selectedEl.setAttribute('x', vb.width - w);
        if(type === 'top') selectedEl.setAttribute('y', 0);
        if(type === 'center-v') selectedEl.setAttribute('y', (vb.height - h) / 2);
        if(type === 'bottom') selectedEl.setAttribute('y', vb.height - h);

        updateControlLayer();
        saveState();
    };

    function renderProperties() {
        const panel = document.getElementById('editor-fields');
        if(!selectedEl) return panel.innerHTML = `<div style="text-align:center; padding:40px; color:#64748b;">Nesne seçilmedi.</div>`;

        const tag = selectedEl.tagName.toLowerCase();
        let html = `
            <div style="margin-bottom:20px;">
                <span class="label-text">HIZALAMA ARAÇLARI</span>
                <div class="grid-3">
                    <button class="action-btn" onclick="alignAction('left')">SOL</button>
                    <button class="action-btn" onclick="alignAction('center-h')">O.YATAY</button>
                    <button class="action-btn" onclick="alignAction('right')">SAĞ</button>
                    <button class="action-btn" onclick="alignAction('top')">ÜST</button>
                    <button class="action-btn" onclick="alignAction('center-v')">O.DİKEY</button>
                    <button class="action-btn" onclick="alignAction('bottom')">ALT</button>
                </div>
            </div>
            <div class="collapsible-section">
                <div class="collapsible-header">TEMEL AYARLAR</div>
                <div style="padding:10px;">
                    <span class="label-text">İÇERİK / METİN</span>
                    <input type="text" value="${selectedEl.textContent}" oninput="selectedEl.textContent = this.value; updateControlLayer();">
                    
                    <div class="grid-3" style="margin-top:10px;">
                        <div>
                            <span class="label-text">X</span>
                            <input type="number" value="${parseInt(selectedEl.getAttribute('x')||0)}" oninput="selectedEl.setAttribute('x', this.value); updateControlLayer();">
                        </div>
                        <div>
                            <span class="label-text">Y</span>
                            <input type="number" value="${parseInt(selectedEl.getAttribute('y')||0)}" oninput="selectedEl.setAttribute('y', this.value); updateControlLayer();">
                        </div>
                        <div>
                            <span class="label-text">RENK</span>
                            <input type="color" value="${selectedEl.getAttribute('fill') || '#000000'}" oninput="selectedEl.setAttribute('fill', this.value)">
                        </div>
                    </div>
                </div>
            </div>
            <button class="action-btn" style="width:100%; background:var(--error); margin-top:10px;" onclick="deleteElement()">SİL</button>
        `;
        panel.innerHTML = html;
    }

    // --- MOTOR VE ETKİLEŞİM ---
    function attachEvents() {
        const wrapper = document.getElementById('svg-wrapper');
        wrapper.onmousedown = (e) => {
            const el = e.target.closest('.duzenlenebilir');
            if(el) {
                selectedEl = el;
                renderProperties();
                updateControlLayer();
                
                let startX = e.clientX, startY = e.clientY;
                let origX = parseFloat(el.getAttribute('x')) || 0;
                let origY = parseFloat(el.getAttribute('y')) || 0;

                document.onmousemove = (me) => {
                    let dx = (me.clientX - startX) / currentZoom;
                    let dy = (me.clientY - startY) / currentZoom;
                    el.setAttribute('x', origX + dx);
                    el.setAttribute('y', origY + dy);
                    updateControlLayer();
                };
                document.onmouseup = () => {
                    document.onmousemove = null;
                    saveState();
                };
            } else {
                selectedEl = null;
                updateControlLayer();
                renderProperties();
            }
        };
    }

    function updateControlLayer() {
        const ctrl = document.getElementById('control-layer');
        ctrl.innerHTML = "";
        if(!selectedEl) return;
        
        const bbox = selectedEl.getBBox();
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", bbox.x);
        rect.setAttribute("y", bbox.y);
        rect.setAttribute("width", bbox.width);
        rect.setAttribute("height", bbox.height);
        rect.setAttribute("fill", "none");
        rect.setAttribute("stroke", "var(--accent)");
        rect.setAttribute("stroke-width", "2");
        rect.setAttribute("stroke-dasharray", "4,2");
        ctrl.appendChild(rect);
    }

    function saveState() {
        const svg = document.querySelector('#canvas-inner svg').cloneNode(true);
        historyStack = historyStack.slice(0, historyIndex + 1);
        historyStack.push(svg.outerHTML);
        historyIndex++;
        renderLayers();
    }

    function undo() { if(historyIndex > 0) { historyIndex--; applyHistory(); } }
    function redo() { if(historyIndex < historyStack.length - 1) { historyIndex++; applyHistory(); } }
    function applyHistory() {
        document.getElementById('canvas-inner').innerHTML = historyStack[historyIndex];
        attachEvents();
        renderLayers();
    }

    function renderLayers() {
        const box = document.getElementById('layers-wrapper');
        box.innerHTML = "";
        const elements = Array.from(document.querySelectorAll('.duzenlenebilir')).reverse();
        elements.forEach(el => {
            const item = document.createElement('div');
            item.style = "padding:10px; border-bottom:1px solid #334155; font-size:11px; cursor:pointer; display:flex; justify-content:space-between;";
            item.innerHTML = `<span>${el.tagName} (#${el.id.slice(-4)})</span>`;
            item.onclick = () => { selectedEl = el; updateControlLayer(); renderProperties(); };
            box.appendChild(item);
        });
    }

    async function saveData() {
        showStatus("KAYDEDİLİYOR...");
        const svg = document.querySelector('#canvas-inner svg').outerHTML;
        const file = document.getElementById('file-selector').value;
        
        try {
            const res = await fetch(WORKER_URL, {
                method: "PUT",
                headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file},
                body: JSON.stringify({ content: utf8_to_b64(svg), sha: SHA_KEY })
            });
            if(res.ok) showStatus("KAYDEDİLDİ!", 2000);
            else alert("Hata oluştu!");
        } catch(e) { alert("Sunucu hatası!"); }
    }

    function changeZoom(val) { currentZoom += val; applyZoom(); }
    function resetZoom() { currentZoom = 1; applyZoom(); }
    function applyZoom() { document.getElementById('svg-wrapper').style.transform = `scale(${currentZoom})`; }
    function showStatus(txt, ms) { 
        const s = document.getElementById('status-info'); 
        s.innerText = txt; s.style.display = "block"; 
        if(ms) setTimeout(() => s.style.display="none", ms);
    }
    function hideStatus() { document.getElementById('status-info').style.display = "none"; }
    function deleteElement() { if(selectedEl) { selectedEl.remove(); selectedEl = null; updateControlLayer(); renderProperties(); saveState(); } }

</script>
</body>
</html>
