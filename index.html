<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Pro Studio | Yeni Nesil V9 (Collapsible UI)</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700;800&family=Nunito:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Pacifico&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; --handle-move: #3b82f6; --handle-rotate: #f59e0b; --handle-radius: #ec4899; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh; overflow: hidden; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overscroll-behavior-y: none; }

        /* GİRİŞ EKRANI */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; outline: none; font-size:14px; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size:14px; }
        .login-card button:hover { opacity: 0.9; }

        /* ANA DÜZEN - TUVAL & SİDEBAR ORANI DEĞİŞTİ */
        #app-container { display: none; height: 100%; width: 100%; flex-direction: row; }
        #sidebar { width: 480px; /* GENİŞLİK ARTIRILDI (Eski: 380px) */ background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; z-index: 100; }
        .sidebar-nav { padding: 15px; background: #111827; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        
        /* KATMANLAR ÜSTE ALINDI VE KÜÇÜLTÜLDÜ */
        #layers-wrapper { display: flex; flex-direction: column; height: 25%; /* BOYUT AZALTILDI (Eski: 35%) */ border-bottom: 2px solid var(--border); background: #0f172a; flex-shrink: 0; }
        #layers-header { padding: 10px 15px; font-size: 12px; font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--border); background: #111827; }
        #layers-list { flex: 1; overflow-y: auto; }
        
        /* ÖZELLİKLER PANELİ ALTA ALINDI VE GENİŞLETİLDİ */
        #editor-fields { flex: 1; min-height: 0; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.2); }

        .layer-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; transition: 0.2s; background: #1e293b; color: #cbd5e1; }
        .layer-item:hover { background: #334155; }
        .layer-item.active { border-left: 4px solid var(--accent); background: rgba(16, 185, 129, 0.15); color: white; font-weight: bold; }
        .layer-actions { display: flex; gap: 10px; align-items: center; }
        .layer-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; padding: 0; transition: 0.2s; }
        .layer-btn:hover { color: white; transform: scale(1.2); }

        /* ÇİZİM VE ZOOM ALANI - TUVAL KÜÇÜLTÜLDÜ (flex 1 ile otomatik) */
        #main-view { flex: 1; background: #020617; overflow: hidden; position: relative; height: 100%; }
        #zoom-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform-origin: center center; transition: transform 0.2s ease-out; }
        #svg-wrapper { position: relative; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px black; touch-action: none; transition: transform 0.1s; }
        #canvas-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #canvas-inner svg { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; overflow: visible; }
        
        /* ÇİZİM MODU CURSOR */
        .draw-mode { cursor: crosshair !important; }
        .pan-mode { cursor: grab !important; }
        .panning { cursor: grabbing !important; }

        .floating-tools { position: fixed; bottom: 20px; left: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 8px; display: flex; gap: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 500; }
        .tool-btn { background: #0f172a; color: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tool-btn:hover { background: var(--accent); border-color: var(--accent); }
        .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; background: #0f172a !important; border-color: var(--border) !important; }

        /* TUTAMAÇLAR VE KILAVUZLAR */
        .duzenlenebilir { cursor: move; pointer-events: all; }
        .locked { cursor: not-allowed !important; }
        #control-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: visible; }
        .handle { fill: white; stroke-width: 2; pointer-events: all; transition: transform 0.2s; }
        .handle:hover { transform: scale(1.3); }
        .handle-resize { stroke: var(--handle-move); cursor: nwse-resize; }
        .handle-rotate { stroke: var(--handle-rotate); cursor: crosshair; fill: var(--handle-rotate); }
        .handle-radius { stroke: var(--handle-radius); cursor: ns-resize; fill: var(--handle-radius); }
        .snap-line { stroke: #ec4899; stroke-width: 1.5; stroke-dasharray: 4,4; pointer-events: none; z-index: 60; }
        .guide-line { stroke: #06b6d4; stroke-width: 3; stroke-dasharray: 8,4; cursor: grab; pointer-events: all; }

        /* YENİ NESİL ARAYÜZ KONTROLLERİ */
        input[type="range"] { width: 100%; accent-color: var(--accent); height: 6px; cursor: pointer; margin: 0; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; font-size: 13px; }
        input[type="text"]:focus, input[type="number"]:focus { border-color: var(--accent); }
        .font-select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 5px; outline: none; font-size: 13px; cursor: pointer; }
        
        .action-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .action-btn { flex: 1; background: #334155; color: white; border: none; border-radius: 8px; padding: 10px 15px; font-size: 12px; font-weight: bold; cursor: pointer; text-align:center;}
        .action-btn:hover { background: #475569; }
        .action-btn.active { background: var(--accent); }
        .action-btn.danger { background: #991b1b; }
        .action-btn.special { background: #0284c7; }
        .action-btn.svg { background: #ea580c; }
        .action-btn.draw { background: #8b5cf6; }

        .group-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; border: 1px solid #1e293b; margin-top: 10px; }
        
        /* AÇILIR/KAPANIR BÖLÜM STİLLERİ (PROFESYONEL) */
        .collapsible-section { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 12px; background: rgba(0,0,0,0.25); }
        .collapsible-header { background: #111827; padding: 12px 18px; cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: bold; color: var(--accent); letter-spacing: 1.5px; display: flex; justify-content: space-between; align-items: center; }
        .collapsible-header:hover { background: rgba(16, 185, 129, 0.1); }
        .collapsible-header.active::after { content: '▼'; font-size: 9px; }
        .collapsible-header:not(.active)::after { content: '◀'; font-size: 9px; }
        .collapsible-content { display: none; padding: 18px; }
        .collapsible-content.active { display: block; }
        
        /* GRID DÜZENİ */
        .property-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 15px; margin-bottom: 10px; }
        .property-grid.full { grid-template-columns: 1fr; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .label-text { font-size: 11px; color: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;}
        .value-badge { background: #000; color: var(--accent); font-size: 11px; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-weight: bold; }
        
        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); text-align: center; padding: 10px; z-index: 11000; display: none; font-weight: bold; letter-spacing: 1px;}
        
        @media (max-width: 1023px) { 
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; border-top: 1px solid var(--border); border-left: none; order: 2; }
            #main-view { width: 100%; height: 50%; order: 1; }
            .floating-tools { bottom: auto; top: 10px; left: 50%; transform: translateX(-50%); }
            #layers-wrapper { height: 25%; }
        }
    </style>
</head>
<body>

<div id="status-info">İşlem Yapılıyor...</div>

<div id="login-screen">
    <div class="login-card">
        <h2 style="margin-top:0; color:white;">Pro Studio V9</h2>
        <div style="font-size:12px; color:#94a3b8; margin-bottom:20px;">Lütfen Cloudflare Worker şifrenizi girin.</div>
        <input type="password" id="passInput" placeholder="Sunucu Şifresi">
        <button id="loginBtn">Sunucuya Bağlan</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div class="floating-tools">
            <button class="tool-btn" id="btn-undo" onclick="undo()" title="Geri Al (Ctrl+Z)">↩ Geri</button>
            <button class="tool-btn" id="btn-redo" onclick="redo()" title="İleri Al (Ctrl+Y)">İleri ↪</button>
            <div style="width: 1px; background: var(--border); margin: 0 5px;"></div>
            <button class="tool-btn" onclick="changeZoom(-0.1)" title="Uzaklaştır">-</button>
            <button class="tool-btn" id="zoom-val" onclick="resetZoom()" title="Sıfırla">100%</button>
            <button class="tool-btn" onclick="changeZoom(0.1)" title="Yakınlaştır">+</button>
        </div>
        <div id="zoom-container">
            <div id="svg-wrapper">
                <div id="canvas-inner"></div>
                <svg id="control-layer"></svg>
            </div>
        </div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-nav">
            <div style="display:flex; gap:5px; margin-bottom: 10px;">
                <button id="saveBtn" class="action-btn active" style="flex:2; font-size:12px;">💾 KAYDET</button>
                <button onclick="downloadPNG()" class="action-btn special" style="flex:1;">📥 PNG</button>
                <button onclick="downloadSVG()" class="action-btn svg" style="flex:1;">📥 SVG</button>
            </div>

            <select id="file-selector" style="width:100%; padding:10px; background:#000; color:#fff; border-radius:8px; margin-bottom:10px; border:1px solid #334155; outline:none;">
                <option value="slayt.svg">Ana Slayt (slayt.svg)</option>
                <option value="kampanya.svg">Kampanya (kampanya.svg)</option>
                <option value="duyuru.svg">Duyuru (duyuru.svg)</option>
            </select>

            <details style="margin-bottom: 10px;">
                <summary style="font-size:11px; font-weight:bold; color:var(--accent); cursor:pointer; margin-bottom:5px;">📐 TUVAL AYARLARI (GÖSTER)</summary>
                <div class="group-box" style="margin-top:5px;">
                    <div style="display:flex; gap:10px; align-items: center; margin-bottom:10px;">
                        <input type="number" id="canvas-w" placeholder="Genişlik" onchange="updateCanvasSize()">
                        <span style="color:#64748b;">X</span>
                        <input type="number" id="canvas-h" placeholder="Yükseklik" onchange="updateCanvasSize()">
                        <input type="color" id="canvas-bg-color" title="Arka Plan Rengi" oninput="updateCanvasBg()" style="width:40px; height:35px; cursor:pointer; border:none; background:none;">
                    </div>
                    <div class="action-row" style="margin:0;">
                        <button onclick="addGuide('h')" class="action-btn" style="background:#06b6d4; font-size:11px;">+ YATAY KILAVUZ</button>
                        <button onclick="addGuide('v')" class="action-btn" style="background:#06b6d4; font-size:11px;">+ DİKEY KILAVUZ</button>
                    </div>
                </div>
            </details>
            
            <div class="action-row" style="margin-bottom:5px;">
                <button id="addTextBtn" class="action-btn">+ YAZI</button>
                <button id="addImgBtn" class="action-btn" title="Masaüstünden Sürükle-Bırak da Yapabilirsiniz">+ RESİM</button>
                <button onclick="addShape('rect')" class="action-btn">+ KARE</button>
            </div>
            <div class="action-row">
                <button onclick="addIcon('star')" class="action-btn">⭐ YILDIZ</button>
                <button onclick="addIcon('heart')" class="action-btn">❤️ KALP</button>
                <button id="btn-draw" onclick="toggleDrawMode()" class="action-btn draw" title="Fırça Aracı">🖌️ ÇİZİM</button>
            </div>
            <input type="file" id="img-in" hidden>
        </div>

        <div id="layers-wrapper">
            <div id="layers-header">📑 KATMANLAR HİYERARŞİSİ</div>
            <div id="layers-list"></div>
        </div>

        <div id="editor-fields">
            <div style="text-align:center; color:#64748b; margin-top:50px; font-style:italic; font-size:13px;">
                👆 Düzenlemek için sahneden veya katmanlardan bir nesne seçin.
            </div>
        </div>
    </div>
</div>

<script>
    // =========================================================================
    // DİKKAT: BURAYA SADECE KENDİ CLOUDFLARE WORKER LİNKİNİZİ YAZIN. 
    // ÖRNEK: "https://tasarim.isminiz.workers.dev" (Tırnakları silmeyin!)
    // =========================================================================
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev"; 
    
    let SHA_KEY = "", SESSION_PASS = "";
    
    // Düzenleme Durumları
    let selectedEl = null, resizingEl = null, rotatingEl = null, radiusingEl = null, activeHandle = null;
    let offset = {x:0, y:0}, startP = {x:0, y:0}, startData = {}, isModified = false;
    let clipboard = null;
    
    // Zoom ve Pan Durumları
    let currentZoom = 1; let panX = 0; let panY = 0;
    let historyStack = []; let historyIndex = -1;
    let isDrawingMode = false; let isDrawing = false; let currentPath = null; let pathData = "";
    let isDraggingGuide = false; let currentGuide = null;
    let isDraggingElement = false; 
    let isSpacePressed = false; let isPanning = false; let panStart = {x:0, y:0}; let panOffsetStart = {x:0, y:0};

    window.updateEditorUI = null;

    const googleFonts = [
        { name: "Varsayılan", val: "sans-serif" }, { name: "Roboto", val: "'Roboto', sans-serif" },
        { name: "Montserrat", val: "'Montserrat', sans-serif" }, { name: "Poppins", val: "'Poppins', sans-serif" },
        { name: "Open Sans", val: "'Open Sans', sans-serif" }, { name: "Lato", val: "'Lato', sans-serif" },
        { name: "Playfair Display", val: "'Playfair Display', serif" }, { name: "Pacifico", val: "'Pacifico', cursive" }
    ];

    const ICONS = {
        star: "M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z",
        heart: "M12 4.435c-1.989-5.399-12-4.597-12 3.568 0 4.068 3.06 9.481 12 14.997 8.94-5.516 12-10.929 12-14.997 0-8.118-10-8.999-12-3.568z"
    };

    // === SUNUCU MODU (WORKER) GİRİŞİ VE DOSYA YÜKLEME ===
    const login = async () => {
        if (WORKER_URL === "") {
            alert("Lütfen HTML kodunun içindeki WORKER_URL kısmına kendi Cloudflare Worker linkinizi yazın!");
            return;
        }

        const passVal = document.getElementById('passInput').value;
        if(!passVal) { alert("Lütfen Worker şifrenizi girin!"); return; }
        
        SESSION_PASS = passVal;
        await loadSlide(); 
    };
    
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('passInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
    document.getElementById('file-selector').addEventListener('change', loadSlide);

    async function loadSlide() {
        const file = document.getElementById('file-selector').value;
        const st = document.getElementById('status-info'); 
        st.innerText = "WORKER'DAN YÜKLENİYOR..."; st.style.display = "block";
        
        try {
            const res = await fetch(WORKER_URL, { 
                headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file} 
            });
            
            if (res.status === 401) {
                alert("Worker Şifresi Hatalı veya Yetkisiz!");
                st.style.display="none"; 
                document.getElementById('login-screen').style.display = "flex";
                document.getElementById('app-container').style.display = "none";
                return;
            }
            
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";

            if (res.status === 404) {
                SHA_KEY = "";
                const svgHTML = `<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg"><rect id="canvas-background" x="0" y="0" width="1920" height="1080" fill="#ffffff"></rect><g id="guides-group"></g></svg>`;
                document.getElementById('canvas-inner').innerHTML = svgHTML;
            } else {
                const data = await res.json(); 
                SHA_KEY = data.sha || "";
                document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            }
            
            historyStack = []; historyIndex = -1;
            setTimeout(() => { setupLayers(); initCanvasSettings(); resetZoom(); saveState(); }, 200);
            st.style.display = "none";
        } catch(e) { 
            console.error(e);
            alert("Bağlantı Hatası! Sunucuya ulaşılamıyor. Lütfen URL'nizi kontrol edin."); 
            st.style.display="none"; 
            document.getElementById('login-screen').style.display = "flex";
            document.getElementById('app-container').style.display = "none";
        }
    }

    // === SÜRÜKLE-BIRAK DOSYA EKLEME (DRAG & DROP) ===
    const mainView = document.getElementById('main-view');
    mainView.addEventListener('dragover', (e) => { e.preventDefault(); mainView.style.opacity = '0.8'; });
    mainView.addEventListener('dragleave', (e) => { e.preventDefault(); mainView.style.opacity = '1'; });
    mainView.addEventListener('drop', (e) => {
        e.preventDefault(); mainView.style.opacity = '1';
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            const file = e.dataTransfer.files[0];
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const svg = document.querySelector('#canvas-inner svg'); const vb = svg.viewBox.baseVal; 
                    const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                    img.id = "img_" + Date.now(); img.setAttribute("class", "duzenlenebilir"); 
                    img.setAttribute("x", vb.width ? (vb.width/2)-150 : 100); img.setAttribute("y", vb.height ? (vb.height/2)-150 : 100); 
                    img.setAttribute("width", 300); img.setAttribute("height", 300); 
                    img.dataset.rx = "0"; img.dataset.smoothing = "0.5"; img.dataset.maskShape = "none"; 
                    img.setAttribute("href", ev.target.result); img.setAttributeNS("http://www.w3.org/1999/xlink", "href", ev.target.result);
                    svg.appendChild(img); selectedEl = img; saveState(); setupLayers(false); window.updateEditorUI(img);
                }; 
                reader.readAsDataURL(file);
            }
        }
    });

    // === İNDİRME ===
    function hideGuides(hide) { const gg = document.getElementById('guides-group'); if(gg) gg.style.display = hide ? 'none' : 'block'; }
    function downloadPNG() {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return;
        document.getElementById('control-layer').innerHTML = ""; selectedEl = null; renderEditor();
        hideGuides(true);
        const svgData = new XMLSerializer().serializeToString(svg); const canvas = document.createElement("canvas"); const ctx = canvas.getContext("2d"); const img = new Image();
        img.onload = function() { canvas.width = svg.viewBox.baseVal.width || 1920; canvas.height = svg.viewBox.baseVal.height || 1080; ctx.drawImage(img, 0, 0); const a = document.createElement("a"); a.download = "tasarim.png"; a.href = canvas.toDataURL("image/png"); a.click(); hideGuides(false); };
        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
    }
    function downloadSVG() {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return;
        document.getElementById('control-layer').innerHTML = ""; selectedEl = null; renderEditor();
        hideGuides(true);
        const svgData = new XMLSerializer().serializeToString(svg);
        const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"}); const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.download = "tasarim_vektor.svg"; a.href = url; a.click();
        hideGuides(false);
    }

    // === TUVAL & KILAVUZ YÖNETİMİ ===
    function initCanvasSettings() {
        const svg = document.querySelector('#canvas-inner svg'); if (!svg) return; const vb = svg.viewBox.baseVal;
        document.getElementById('canvas-w').value = vb.width || 1920; document.getElementById('canvas-h').value = vb.height || 1080;
        let bgRect = svg.querySelector('#canvas-background');
        if (!bgRect) { bgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect"); bgRect.id = "canvas-background"; bgRect.setAttribute("x", "0"); bgRect.setAttribute("y", "0"); bgRect.setAttribute("width", vb.width || 1920); bgRect.setAttribute("height", vb.height || 1080); bgRect.setAttribute("fill", "#ffffff"); svg.insertBefore(bgRect, svg.firstChild); }
        document.getElementById('canvas-bg-color').value = safeColor(bgRect.getAttribute("fill"));
        if(!svg.querySelector('#guides-group')) { const gg = document.createElementNS("http://www.w3.org/2000/svg", "g"); gg.id = "guides-group"; svg.appendChild(gg); }
    }
    window.updateCanvasSize = function() { const w = document.getElementById('canvas-w').value; const h = document.getElementById('canvas-h').value; const svg = document.querySelector('#canvas-inner svg'); svg.setAttribute("viewBox", `0 0 ${w} ${h}`); document.getElementById('control-layer').setAttribute("viewBox", `0 0 ${w} ${h}`); const bgRect = svg.querySelector('#canvas-background'); if(bgRect) { bgRect.setAttribute("width", w); bgRect.setAttribute("height", h); } saveState(); };

            }

            const p = getCoords(e);
            if (isDrawing && currentPath) { pathData += ` L ${p.x} ${p.y}`; currentPath.setAttribute("d", pathData); return; }
            if (isDraggingGuide && currentGuide) { if(currentGuide.dataset.type === 'h') { currentGuide.setAttribute('y1', p.y); currentGuide.setAttribute('y2', p.y); } else { currentGuide.setAttribute('x1', p.x); currentGuide.setAttribute('x2', p.x); } return; }

            if (!selectedEl && !resizingEl && !rotatingEl && !radiusingEl) return;
            if (selectedEl && selectedEl.dataset.locked === "true" && !resizingEl && !rotatingEl && !radiusingEl) return; 
            e.preventDefault(); const dx = p.x - startP.x; const dy = p.y - startP.y;
            
            let snapX = null, snapY = null; const snapTolerance = 15; const cx = svg.viewBox.baseVal.width / 2, cy = svg.viewBox.baseVal.height / 2;

            if (resizingEl) {
                isModified = true; let { x, y, w, h } = startData;
                if (activeHandle === 'br') { w += dx; h += dy; } else if (activeHandle === 'bl') { x += dx; w -= dx; h += dy; } else if (activeHandle === 'tr') { y += dy; w += dx; h -= dy; } else if (activeHandle === 'tl') { x += dx; y += dy; w -= dx; h -= dy; }
                if (resizingEl.tagName === "image" || resizingEl.tagName === "rect" || resizingEl.tagName === "svg") {
                    if (w > 10 && h > 10) { resizingEl.setAttribute("x", x); resizingEl.setAttribute("y", y); resizingEl.setAttribute("width", w); resizingEl.setAttribute("height", h); if(resizingEl.tagName !== "svg" && resizingEl.dataset.maskShape && resizingEl.dataset.maskShape !== "none") window.applyShapeMask(resizingEl); }
                } else if(resizingEl.tagName === 'text') { resizingEl.dataset.baseFontSize = Math.max(5, startData.baseFontSize + dx/2); window.applyTextCurve(resizingEl); }
                updateUI(resizingEl); syncSliders(resizingEl);
            } 
            else if (rotatingEl) {
                isModified = true; let bbox = {x:0, y:0, width:0, height:0}; try{ bbox = rotatingEl.getBBox(); }catch(e){}
                const angle = Math.atan2(p.y - (bbox.y + bbox.height/2), p.x - (bbox.x + bbox.width/2)) * (180 / Math.PI) + 90; 
                rotatingEl.dataset.angle = angle; window.applyTransforms(rotatingEl); updateUI(rotatingEl);
            }
            else if (radiusingEl && (radiusingEl.tagName === "image" || radiusingEl.tagName === "rect")) {
                isModified = true; radiusingEl.dataset.rx = Math.max(0, Math.min(startData.w/2, startData.h/2, startData.rx + dy)); window.applyShapeMask(radiusingEl); updateUI(radiusingEl); syncSliders(radiusingEl);
            }
            else if (selectedEl && isDraggingElement) {
                isModified = true; let newX = p.x - offset.x, newY = p.y - offset.y;
                let bbox = {width:0, height:0}; try { bbox = selectedEl.getBBox(); }catch(e){}
                const elCx = selectedEl.tagName === 'text' ? newX : newX + bbox.width / 2; const elCy = selectedEl.tagName === 'text' ? newY : newY + bbox.height / 2;
                
                if (Math.abs(elCx - cx) < snapTolerance) { snapX = cx; newX = selectedEl.tagName === 'text' ? cx : cx - bbox.width / 2; }
                if (Math.abs(elCy - cy) < snapTolerance) { snapY = cy; newY = selectedEl.tagName === 'text' ? cy : cy - bbox.height / 2; }
                
                document.querySelectorAll('.guide-line').forEach(g => {
                    if (g.dataset.type === 'h') { const gy = parseFloat(g.getAttribute('y1')); if (Math.abs(elCy - gy) < snapTolerance) { snapY = gy; newY = selectedEl.tagName === 'text' ? gy : gy - bbox.height / 2; } }
                    else { const gx = parseFloat(g.getAttribute('x1')); if (Math.abs(elCx - gx) < snapTolerance) { snapX = gx; newX = selectedEl.tagName === 'text' ? gx : gx - bbox.width / 2; } }
                });

                selectedEl.setAttribute("x", newX); selectedEl.setAttribute("y", newY);
                if((selectedEl.tagName === 'image' || selectedEl.tagName === 'rect') && selectedEl.dataset.maskShape && selectedEl.dataset.maskShape !== "none") window.applyShapeMask(selectedEl); 
                if(selectedEl.tagName === 'text' && selectedEl.dataset.curve) window.applyTextCurve(selectedEl);
                updateUI(selectedEl, snapX, snapY);
            }
        };

        const release = (e) => { 
            try { wrapper.releasePointerCapture(e.pointerId); } catch(err){} 
            isDraggingElement = false; 
            if (isPanning) { isPanning = false; document.getElementById('svg-wrapper').classList.remove('panning'); return; }
            if (isDrawing) { isDrawing = false; selectedEl = currentPath; currentPath = null; isDrawingMode = false; document.getElementById('btn-draw').classList.remove('active'); document.getElementById('svg-wrapper').classList.remove('draw-mode'); saveState(); renderEditor(); updateUI(selectedEl); return; }
            if (isDraggingGuide) { isDraggingGuide = false; currentGuide = null; saveState(); return; }
            if (isModified) saveState(); selectedEl = null; resizingEl = null; rotatingEl = null; radiusingEl = null; activeHandle = null; isModified = false; document.querySelectorAll('.snap-line').forEach(l=>l.remove()); 
        };
        window.onpointerup = release; window.onpointercancel = release;

        function updateUI(el, snapX=null, snapY=null) {
            ctrl.innerHTML = ""; if(!el) return;
            let b = {x:0,y:0,width:0,height:0}; try { b = el.getBBox(); }catch(e){return;}
            const transform = el.getAttribute("transform") || ""; const isLocked = el.dataset.locked === "true";
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.setAttribute("transform", transform); ctrl.appendChild(g);

            const vb = svg.viewBox.baseVal;
            if (snapX !== null) { const lX = document.createElementNS("http://www.w3.org/2000/svg", "line"); lX.setAttribute("x1", snapX); lX.setAttribute("y1", 0); lX.setAttribute("x2", snapX); lX.setAttribute("y2", vb.height); lX.classList.add("snap-line"); ctrl.appendChild(lX); }
            if (snapY !== null) { const lY = document.createElementNS("http://www.w3.org/2000/svg", "line"); lY.setAttribute("x1", 0); lY.setAttribute("y1", snapY); lY.setAttribute("x2", vb.width); lY.setAttribute("y2", snapY); lY.classList.add("snap-line"); ctrl.appendChild(lY); }

            if (el.tagName === 'text' && (parseFloat(el.dataset.maxWidth) || 0) > 0 && !isLocked) {
                const mw = parseFloat(el.dataset.maxWidth); const cx = parseFloat(el.getAttribute("x")) || 0; const mwRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                mwRect.setAttribute("x", cx - mw/2); mwRect.setAttribute("y", b.y); mwRect.setAttribute("width", mw); mwRect.setAttribute("height", b.height); mwRect.setAttribute("fill", "rgba(16, 185, 129, 0.05)"); mwRect.setAttribute("stroke", "var(--accent)"); mwRect.setAttribute("stroke-dasharray", "4,4"); g.appendChild(mwRect);
            }
            const strokeColor = isLocked ? "var(--error)" : "var(--handle-move)";
            const r = document.createElementNS("http://www.w3.org/2000/svg", "rect"); r.setAttribute("x", b.x); r.setAttribute("y", b.y); r.setAttribute("width", b.width); r.setAttribute("height", b.height); r.setAttribute("fill", "none"); r.setAttribute("stroke", strokeColor); r.setAttribute("stroke-width", "2"); r.setAttribute("stroke-dasharray", "6,4"); g.appendChild(r);
            
            if (isLocked) return;
            const s = 24; const corners = [{ id: 'tl', x: b.x, y: b.y, cur: 'nwse-resize' }, { id: 'tr', x: b.x + b.width, y: b.y, cur: 'nesw-resize' }, { id: 'bl', x: b.x, y: b.y + b.height, cur: 'nesw-resize' }, { id: 'br', x: b.x + b.width, y: b.y + b.height, cur: 'nwse-resize' }];
            corners.forEach(c => { const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect"); rect.setAttribute("x", c.x - s/2); rect.setAttribute("y", c.y - s/2); rect.setAttribute("width", s); rect.setAttribute("height", s); rect.setAttribute("class", "handle handle-resize"); rect.dataset.id = el.id; rect.dataset.handle = c.id; rect.style.cursor = c.cur; g.appendChild(rect); });
            
            const rotY = b.y - 40; const line = document.createElementNS("http://www.w3.org/2000/svg", "line"); line.setAttribute("x1", b.x + b.width/2); line.setAttribute("y1", b.y); line.setAttribute("x2", b.x + b.width/2); line.setAttribute("y2", rotY); line.setAttribute("stroke", "var(--handle-rotate)"); line.setAttribute("stroke-width", "2"); g.appendChild(line);
            const rotH = document.createElementNS("http://www.w3.org/2000/svg", "circle"); rotH.setAttribute("cx", b.x + b.width/2); rotH.setAttribute("cy", rotY); rotH.setAttribute("r", s/2.5); rotH.setAttribute("class", "handle handle-rotate"); rotH.dataset.id = el.id; g.appendChild(rotH);

            if ((el.tagName === "image" || el.tagName === "rect") && el.dataset.maskShape && el.dataset.maskShape === 'squircle') {
                const radH = document.createElementNS("http://www.w3.org/2000/svg", "circle"); radH.setAttribute("cx", b.x + b.width); radH.setAttribute("cy", b.y + (parseFloat(el.dataset.rx) || 0)); radH.setAttribute("r", s/2.5); radH.setAttribute("class", "handle handle-radius"); radH.dataset.id = el.id; g.appendChild(radH);
            }
        }
        window.updateEditorUI = updateUI; 
    }

    // === KATMANLAR VE ÖZELLİK PANELİ RENDER (YENİ NESİL) ===
    function renderEditor() { renderLayers(); renderProperties(); }

    function renderLayers() {
        const list = document.getElementById('layers-list'); list.innerHTML = "";
        const elements = Array.from(document.querySelectorAll('.duzenlenebilir')).reverse();
        
        elements.forEach((el) => {
            const isLocked = el.dataset.locked === "true"; const isActive = selectedEl === el;
            let typeName = el.tagName.toUpperCase(); 
            if (typeName === 'RECT') typeName = 'ŞEKİL'; if (typeName === 'G' || typeName === 'SVG') typeName = 'İKON'; 
            if (typeName === 'PATH') typeName = 'ÇİZİM'; if (typeName === 'IMAGE') typeName = 'RESİM';
            if (el.tagName === 'text') { let txt = el.dataset.rawText || el.textContent; typeName = `T: ${txt.substring(0,10)}${txt.length>10?'...':''}`; }

            const item = document.createElement('div'); item.className = `layer-item ${isActive ? 'active' : ''}`;
            item.onclick = (e) => { 
                if(e.target.closest('.layer-btn')) return; 
                selectedEl = el; isDraggingElement = false; 
                if(window.updateEditorUI) window.updateEditorUI(el); renderEditor(); 
            };
            item.innerHTML = `<span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; ${isLocked ? 'text-decoration:line-through; opacity:0.5;' : ''}">${typeName}</span><div class="layer-actions"><button class="layer-btn" onclick="moveLayer('${el.id}', 1)" title="Yukarı">▲</button><button class="layer-btn" onclick="moveLayer('${el.id}', -1)" title="Aşağı">▼</button><button class="layer-btn" onclick="toggleLock('${el.id}')" title="Kilit">${isLocked ? '🔒' : '🔓'}</button><button class="layer-btn" style="color:#ef4444;" onclick="if(confirm('Silinecek?')){ const delId='${el.id}'; if(selectedEl && selectedEl.id===delId) selectedEl=null; document.getElementById(delId).remove(); saveState(); renderEditor(); document.getElementById('control-layer').innerHTML=''; event.stopPropagation(); }">×</button></div>`;
            list.appendChild(item);
        });
    }

    function syncSliders(el) {
        if (el !== selectedEl) return;
        if (el.tagName === 'text') { const fs = parseFloat(el.dataset.baseFontSize) || 60; const slider = document.getElementById(`fs-slider`); if(slider) slider.value = fs; const badge = document.getElementById(`val-fs`); if(badge) badge.innerText = Math.round(fs) + "px"; } 
        else if (el.tagName !== 'path' && el.tagName !== 'g') {
            const w = Math.round(parseFloat(el.getAttribute("width"))); const h = Math.round(parseFloat(el.getAttribute("height"))); const rx = Math.round(parseFloat(el.dataset.rx) || 0); 
            const ws = document.getElementById(`w-slider`), hs = document.getElementById(`h-slider`), rs = document.getElementById(`r-slider`);
            if(ws) { ws.value = w; document.getElementById(`val-w`).innerText = w + "px"; } if(hs) { hs.value = h; document.getElementById(`val-h`).innerText = h + "px"; } if(rs) { rs.value = rx; rs.max = Math.min(w/2, h/2); document.getElementById(`val-r`).innerText = rx + "px"; }
        }
    }

    // YENİ: AÇILIR BÖLÜMLER İÇİN YARDIMCI FONKSİYON

        return `
            <div class="collapsible-section" id="sec-${id}">
                <div class="collapsible-header active" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active');">${title}</div>
                <div class="collapsible-content active">
                    ${content}
                </div>
            </div>
        `;
    }

    function renderProperties() {
        const f = document.getElementById('editor-fields');
        if (!selectedEl) { f.innerHTML = `<div style="text-align:center; color:#64748b; margin-top:50px; font-style:italic; font-size:13px;">👆 Düzenlemek için sahneden veya katmanlardan bir nesne seçin.</div>`; return; }
        
        const el = selectedEl;
        const id = el.id;

        // 2. METİN İÇERİĞİ (SADECE METİN İÇİN)
        if (isText) {
            const rawText = el.dataset.rawText || el.textContent;
            let contentHtml = `<input type="text" value="${rawText}" oninput="const t=document.getElementById('${id}'); t.dataset.rawText=this.value; window.applyTextCurve(t); if(window.updateEditorUI) window.updateEditorUI(t);" onchange="saveState()" placeholder="Metni girin...">`;
            f.innerHTML += createPropertySection("Metin İçeriği", contentHtml, "text-content");

        // 3. KONUM VE BOYUT (Path Hariç Hepsi)
        if (!isPath) {

            const y = Math.round(parseFloat(el.getAttribute("y")) || bbox.y);

            let transHtml = `

        if (isText) {

            let fontOptions = googleFonts.map(font => `<option value="${font.val}" style="font-family: ${font.val}" ${currentFont.includes(font.name) ? "selected" : ""}>${font.name}</option>`).join('');

                    <div class="input-group">

                        <input type="range" min="-100" max="100" value="${curve}" oninput="const t=document.getElementById('${id}'); t.dataset.curve=this.value; window.applyTextCurve(t); this.previousElementSibling.querySelector('.value-badge').innerText=this.value;">

                    </div>

                        <div class="label-row" style="margin-top:0;"><span class="label-text">OTOMATİK SIĞDIRMA (MAX GENİŞLİK)</span><span class="value-badge">${mw === 0 ? 'KAPALI' : mw + 'px'}</span></div>
                        <input type="range" min="0" max="1500" value="${mw}" oninput="const t=document.getElementById('${id}'); t.dataset.maxWidth=this.value; window.applyTextCurve(t); this.previousElementSibling.querySelector('.value-badge').innerText=this.value == 0 ? 'KAPALI' : this.value+'px';">

        // 6. FORM VE MASKELEME (ŞEKİL VE RESİM)
        if (isShape || isImage) {

            const maskShape = el.dataset.maskShape || 'none';
            const bbox = el.getBBox();
            const maxR = Math.min(bbox.width, bbox.height) / 2;

                    <select class="font-select" style="margin-top:5px;" onchange="const img=document.getElementById('${id}'); img.dataset.maskShape=this.value; window.applyShapeMask(img); saveState(); if(window.updateEditorUI) window.updateEditorUI(img);">
                        <option value="none" ${maskShape === 'none' ? 'selected' : ''}>Yok (Düz)</option>

                </div>
                <div class="input-group">
                    <div class="label-row" style="margin-top:0;"><span class="label-text">KÖŞE YARIÇAPI (SQUIRCLE)</span><span class="value-badge">${Math.round(rx)}px</span></div>
                    <input type="range" min="0" max="${maxR}" value="${rx}" oninput="const img=document.getElementById('${id}'); img.dataset.rx=this.value; window.applyShapeMask(img); this.previousElementSibling.querySelector('.value-badge').innerText=Math.round(this.value)+'px';">
                </div>
            `;
            f.innerHTML += createPropertySection("Form & Maskeleme", formHtml, "form-mask");
        }

        // 7. DOLGU VE RENK (Resim Hariç)
        if (!isImage) {
            const fillType = el.dataset.fillType || 'solid';
            const col1 = el.dataset.color1 || '#10b981';
            const col2 = el.dataset.color2 || '#3b82f6';
            const solidCol = el.dataset.solidColor || (el.getAttribute('fill') === 'none' ? el.getAttribute('stroke') : el.getAttribute('fill')) || "#ffffff";
            
            let fillHtml = `
                <div class="input-group" style="margin-bottom:15px;">
                    <span class="label-text">DOLGU TİPİ</span>
                    <select class="font-select" style="margin-top:5px;" onchange="const t=document.getElementById('${id}'); t.dataset.fillType=this.value; window.applyFill(t); saveState(); renderProperties();">
                        <option value="solid" ${fillType === 'solid' ? 'selected' : ''}>Düz Renk</option>
                        <option value="gradient" ${fillType === 'gradient' ? 'selected' : ''}>Renk Geçişi (Gradient)</option>
                    </select>
                </div>
            `;
            
            if (fillType === 'solid') {
                fillHtml += `
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="color" value="${safeColor(solidCol)}" oninput="const t=document.getElementById('${id}'); t.dataset.solidColor=this.value; window.applyFill(t);" onchange="saveState()" style="width:60px; height:45px; border-radius:8px; border:none; background:none; cursor:pointer;">
                        <button class="action-btn" style="flex:0 0 50px; padding:12px; background:#334155; font-size:18px;" onclick="window.pickColor('${id}', 'solidColor', 'fill')" title="Göz Damlası">💧</button>
                        <input type="text" value="${solidCol}" style="flex:1;" oninput="const t=document.getElementById('${id}'); t.dataset.solidColor=this.value; window.applyFill(t);" onchange="saveState()">
                    </div>
                `;
            } else {
                fillHtml += `
                    <div class="property-grid">
                        <div class="input-group">
                            <span class="label-text">RENK 1</span>
                            <div style="display:flex; gap:5px; align-items:center;">
                                <input type="color" value="${safeColor(col1)}" oninput="const t=document.getElementById('${id}'); t.dataset.color1=this.value; window.applyFill(t);" style="width:40px; height:40px; cursor:pointer;">
                                <button class="action-btn" style="padding:10px; background:#334155;" onclick="window.pickColor('${id}', 'color1', '')">💧</button>
                            </div>
                        </div>
                        <div class="input-group">
                            <span class="label-text">RENK 2</span>
                            <div style="display:flex; gap:5px; align-items:center;">
                                <input type="color" value="${safeColor(col2)}" oninput="const t=document.getElementById('${id}'); t.dataset.color2=this.value; window.applyFill(t);" style="width:40px; height:40px; cursor:pointer;">
                                <button class="action-btn" style="padding:10px; background:#334155;" onclick="window.pickColor('${id}', 'color2', '')">💧</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            f.innerHTML += createPropertySection("Dolgu & Renk", fillHtml, "fill-color");
        }

        // 8. KENARLIK (DİS ÇİZGİ) (Hepsi)
        const strokeCol = el.getAttribute('stroke') || '#000000';
        const strokeW = parseFloat(el.getAttribute('stroke-width')) || 0;
        const dash = el.getAttribute('stroke-dasharray') || 'none';
        
        let strokeHtml = `
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:15px;">
                <input type="color" value="${safeColor(strokeCol)}" oninput="const t=document.getElementById('${id}'); t.setAttribute('stroke', this.value); t.setAttribute('paint-order', 'stroke fill'); t.setAttribute('stroke-linejoin', 'round');" style="width:45px; height:45px; cursor:pointer;">
                <button class="action-btn" style="flex:0 0 45px; padding:12px; background:#334155;" onclick="window.pickColor('${id}', '', 'stroke')">💧</button>
                <input type="text" value="${strokeCol}" style="flex:1;" oninput="const t=document.getElementById('${id}'); t.setAttribute('stroke', this.value);">
            </div>
            <div class="property-grid" style="grid-template-columns: 2fr 1fr;">
                <div class="input-group">
                    <div class="label-row" style="margin-top:0;"><span class="label-text">KALINLIK</span><span class="value-badge">${strokeW}px</span></div>
                    <input type="range" min="0" max="50" value="${strokeW}" oninput="const t=document.getElementById('${id}'); t.setAttribute('stroke-width', this.value); t.setAttribute('paint-order', 'stroke fill'); this.previousElementSibling.querySelector('.value-badge').innerText=this.value+'px';">
                </div>
                <div class="input-group">
                    <span class="label-text">STİL</span>
                    <select class="font-select" style="padding:9px;" onchange="document.getElementById('${id}').setAttribute('stroke-dasharray', this.value); saveState();">
                        <option value="none" ${dash === 'none' ? 'selected' : ''}>Düz</option>
                        <option value="5,5" ${dash === '5,5' ? 'selected' : ''}>Kesikli</option>
                        <option value="2,2" ${dash === '2,2' ? 'selected' : ''}>Noktalı</option>
                    </select>
                </div>
            </div>
        `;
        f.innerHTML += createPropertySection("Kenarlık & Çizgi", strokeHtml, "stroke");

        // 9. EFEKTLER (SAYDAMLIK, GÖLGE, BLUR) (Hepsi)
        let opacityVal = parseFloat(el.getAttribute('opacity')); if (isNaN(opacityVal)) opacityVal = 1;
        const sX = parseFloat(el.dataset.shadowX) || 0, sY = parseFloat(el.dataset.shadowY) || 0, sB = parseFloat(el.dataset.shadowBlur) || 0, sC = el.dataset.shadowColor || '#000000', bl = parseFloat(el.dataset.blur) || 0;
        const blend = el.dataset.blend || 'normal';

        let fxHtml = `
            <div class="input-group" style="margin-bottom:15px;">
                <div class="label-row" style="margin-top:0;"><span class="label-text">SAYDAMLIK (OPACITY)</span><span class="value-badge">${Math.round(opacityVal*100)}%</span></div>
                <input type="range" min="0" max="1" step="0.05" value="${opacityVal}" oninput="const t=document.getElementById('${id}'); t.setAttribute('opacity', this.value); this.previousElementSibling.querySelector('.value-badge').innerText=Math.round(this.value*100)+'%';">
            </div>
            <div class="input-group" style="margin-bottom:15px;">
                <span class="label-text">KARIŞIM MODU (BLEND)</span>
                <select class="font-select" style="margin-top:5px;" onchange="const t=document.getElementById('${id}'); t.dataset.blend=this.value; window.applyFilters(t); saveState();">
                    <option value="normal" ${blend === 'normal' ? 'selected' : ''}>Normal</option>
                    <option value="multiply" ${blend === 'multiply' ? 'selected' : ''}>Çoğalt (Multiply)</option>
                    <option value="screen" ${blend === 'screen' ? 'selected' : ''}>Ekran (Screen)</option>
                    <option value="overlay" ${blend === 'overlay' ? 'selected' : ''}>Kaplama (Overlay)</option>
                </select>
            </div>
            
            <div class="group-box">
                <div class="label-text" style="color:white; margin-bottom:10px;">GÖLGE VE BLUR</div>
                <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                    <input type="color" value="${sC}" oninput="const t=document.getElementById('${id}'); t.dataset.shadowColor=this.value; window.applyFilters(t);" style="width:40px; height:40px; cursor:pointer;">
                    <button class="action-btn" style="padding:10px; background:#334155;" onclick="window.pickColor('${id}', 'shadowColor', '')">💧</button>
                    <input type="text" value="${sC}" style="flex:1;" oninput="const t=document.getElementById('${id}'); t.dataset.shadowColor=this.value;">
                </div>
                <div class="property-grid">
                    <div class="input-group"><span class="label-text">GÖLGE X</span><input type="number" value="${sX}" oninput="const t=document.getElementById('${id}'); t.dataset.shadowX=this.value; window.applyFilters(t);"></div>
                    <div class="input-group"><span class="label-text">GÖLGE Y</span><input type="number" value="${sY}" oninput="const t=document.getElementById('${id}'); t.dataset.shadowY=this.value; window.applyFilters(t);"></div>
                    <div class="input-group"><span class="label-text">GÖLGE BLUR</span><input type="number" value="${sB}" oninput="const t=document.getElementById('${id}'); t.dataset.shadowBlur=this.value; window.applyFilters(t);"></div>
                    <div class="input-group"><span class="label-text">NESNE BLUR</span><input type="number" value="${bl}" oninput="const t=document.getElementById('${id}'); t.dataset.blur=this.value; window.applyFilters(t);"></div>
                </div>
            </div>
        `;
        f.innerHTML += createPropertySection("Efektler & Görünüm", fxHtml, "effects");
        
        // Render sonrası input eventlerini dinleyip saveState tetikle
        f.querySelectorAll('input, select').forEach(inpt => {
            inpt.addEventListener('change', () => { if(!isModified) saveState(); });
        });
    }

    function safeColor(c) { if(!c) return "#ffffff"; if(c.length === 4 && c.startsWith('#')) return "#" + c[1] + c[1] + c[2] + c[2] + c[3] + c[3]; return c.startsWith('#') && c.length === 7 ? c : "#ffffff"; }

    // === EKLEME FONKSİYONLARI ===
    document.getElementById('saveBtn').onclick = saveData;
    document.getElementById('addTextBtn').onclick = addNewText;
    document.getElementById('addImgBtn').onclick = () => document.getElementById('img-in').click();
    document.getElementById('img-in').onchange = (e) => addNewImage(e.target);

    function addNewText() {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return; const vb = svg.viewBox.baseVal; const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.id = "txt_" + Date.now(); t.setAttribute("class", "duzenlenebilir"); t.setAttribute("x", vb.width ? vb.width/2 : 500); t.setAttribute("y", vb.height ? vb.height/2 : 500); 
        t.setAttribute("text-anchor", "middle"); t.setAttribute("dominant-baseline", "central"); t.dataset.baseFontSize = "80"; t.dataset.maxWidth = "600"; t.dataset.rawText = "YENİ METİN";
        t.dataset.solidColor = "#000000"; t.setAttribute("fill", "#000000"); t.setAttribute("font-size", "80"); t.setAttribute("font-family", "sans-serif"); t.textContent = "YENİ METİN";
        svg.appendChild(t); selectedEl = t; saveState(); setupLayers(false); window.updateEditorUI(t);
    }
    
    function addNewImage(input) {
        const file = input.files[0]; if(!file) return; const reader = new FileReader();
        reader.onload = (e) => {
            const svg = document.querySelector('#canvas-inner svg'); const vb = svg.viewBox.baseVal; const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
            img.id = "img_" + Date.now(); img.setAttribute("class", "duzenlenebilir"); img.setAttribute("x", vb.width ? (vb.width/2)-150 : 100); img.setAttribute("y", vb.height ? (vb.height/2)-150 : 100); img.setAttribute("width", 300); img.setAttribute("height", 300); 
            img.dataset.rx = "0"; img.dataset.smoothing = "0.5"; img.dataset.maskShape = "none"; 
            img.setAttribute("href", e.target.result); img.setAttributeNS("http://www.w3.org/1999/xlink", "href", e.target.result);
            svg.appendChild(img); selectedEl = img; saveState(); setupLayers(false); window.updateEditorUI(img);
        }; reader.readAsDataURL(file);
    }
    
    window.addShape = function(type) {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return; const vb = svg.viewBox.baseVal; const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.id = "shp_" + Date.now(); rect.setAttribute("class", "duzenlenebilir"); rect.setAttribute("x", vb.width ? (vb.width/2)-100 : 100); rect.setAttribute("y", vb.height ? (vb.height/2)-100 : 100); rect.setAttribute("width", 200); rect.setAttribute("height", 200); rect.dataset.solidColor = "#10b981"; rect.setAttribute("fill", "#10b981"); rect.dataset.maskShape = "none";
        svg.appendChild(rect); selectedEl = rect; saveState(); setupLayers(false); window.updateEditorUI(rect);
    }
    
    window.addIcon = function(type) {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return; const vb = svg.viewBox.baseVal; 
        const iconGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        iconGroup.id = "icn_" + Date.now(); iconGroup.setAttribute("class", "duzenlenebilir"); 
        const innerSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        innerSvg.setAttribute("x", vb.width ? (vb.width/2)-50 : 100); innerSvg.setAttribute("y", vb.height ? (vb.height/2)-50 : 100); innerSvg.setAttribute("width", 100); innerSvg.setAttribute("height", 100); innerSvg.setAttribute("viewBox", "0 0 24 24");
        iconGroup.dataset.solidColor = "#ec4899"; iconGroup.setAttribute("fill", "#ec4899");
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path"); path.setAttribute("d", ICONS[type]); 
        innerSvg.appendChild(path); iconGroup.appendChild(innerSvg); svg.appendChild(iconGroup); selectedEl = iconGroup; saveState(); setupLayers(false); window.updateEditorUI(iconGroup);
    }

    async function saveData() {
        if (!WORKER_URL || WORKER_URL === "") {
            alert("Lütfen HTML kodunun içindeki WORKER_URL kısmına kendi Cloudflare Worker linkinizi yazın!");
            return;
        }

        const st = document.getElementById('status-info'); 
        st.innerText = "KAYDEDİLİYOR..."; st.style.display = "block";
        
        try {
            document.getElementById('control-layer').innerHTML = ""; hideGuides(true);
            const svgText = new XMLSerializer().serializeToString(document.querySelector('#canvas-inner svg')); 
            const b64 = btoa(unescape(encodeURIComponent(svgText)));
            hideGuides(false);
            
            const fileKey = document.getElementById('file-selector').value;
            const res = await fetch(WORKER_URL, { 
                method: "PUT", 
                headers: { "X-Auth-Key": SESSION_PASS, "X-File-Name": fileKey }, 
                body: JSON.stringify({message: "Pro Studio Final V9", content: b64, sha: SHA_KEY}) 
            });
            
            if(res.ok) { 
                st.innerText = "BAŞARIYLA KAYDEDİLDİ!"; 
            } else { 
                st.innerText = "KAYIT HATASI!"; 
            }
            setTimeout(() => st.style.display="none", 2000);
        } catch(e) { 
            console.error(e);
            alert("Kayıt Hatası: Sunucu bağlantısı kurulamadı."); 
            st.style.display="none"; 
        }
    }
</script>
</body>
</html>
