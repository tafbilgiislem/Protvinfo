<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Pro Studio | Katman Paneli (Layers)</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700;800&family=Nunito:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Pacifico&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; --handle-move: #3b82f6; --handle-rotate: #f59e0b; --handle-radius: #ec4899; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh; overflow: hidden; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overscroll-behavior-y: none; }

        /* GİRİŞ EKRANI */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; outline: none; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .login-card button:hover { opacity: 0.9; }

        /* ANA DÜZEN */
        #app-container { display: none; height: 100%; width: 100%; flex-direction: row; }
        #sidebar { width: 380px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; z-index: 100; }
        .sidebar-nav { padding: 15px; background: #111827; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        
        /* YENİ: KATMANLAR VE ÖZELLİKLER BÖLÜMÜ */
        #layers-wrapper { display: flex; flex-direction: column; height: 35%; border-bottom: 2px solid var(--border); background: #0f172a; flex-shrink: 0; }
        #layers-header { padding: 10px 15px; font-size: 12px; font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--border); background: #111827; }
        #layers-list { flex: 1; overflow-y: auto; }
        #editor-fields { flex: 1; min-height: 0; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.2); }

        .layer-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; transition: 0.2s; background: #1e293b; color: #cbd5e1; }
        .layer-item:hover { background: #334155; }
        .layer-item.active { border-left: 4px solid var(--accent); background: rgba(16, 185, 129, 0.15); color: white; font-weight: bold; }
        .layer-actions { display: flex; gap: 10px; align-items: center; }
        .layer-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; padding: 0; transition: 0.2s; }
        .layer-btn:hover { color: white; transform: scale(1.2); }

        /* ÇİZİM VE ZOOM ALANI */
        #main-view { flex: 1; background: #020617; overflow: auto; position: relative; height: 100%; }
        #zoom-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform-origin: center center; transition: transform 0.2s ease-out; }
        #svg-wrapper { position: relative; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px black; touch-action: none; }
        #canvas-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #canvas-inner svg { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; overflow: visible; }
        .draw-mode { cursor: crosshair !important; }

        .floating-tools { position: fixed; bottom: 20px; left: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 8px; display: flex; gap: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 500; }
        .tool-btn { background: #0f172a; color: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tool-btn:hover { background: var(--accent); border-color: var(--accent); }
        .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; background: #0f172a !important; border-color: var(--border) !important; }

        /* TUTAMAÇLAR VE KILAVUZLAR */
        .duzenlenebilir { cursor: move; pointer-events: all; }
        .locked { cursor: not-allowed !important; }
        #control-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: visible; }
        .handle { fill: white; stroke-width: 2; pointer-events: all; transition: transform 0.2s; }
        .handle:hover { transform: scale(1.3); }
        .handle-resize { stroke: var(--handle-move); cursor: nwse-resize; }
        .handle-rotate { stroke: var(--handle-rotate); cursor: crosshair; fill: var(--handle-rotate); }
        .handle-radius { stroke: var(--handle-radius); cursor: ns-resize; fill: var(--handle-radius); }
        .snap-line { stroke: #ec4899; stroke-width: 1.5; stroke-dasharray: 4,4; pointer-events: none; z-index: 60; }
        .guide-line { stroke: #06b6d4; stroke-width: 3; stroke-dasharray: 8,4; cursor: grab; pointer-events: all; }

        /* ARAYÜZ KONTROLLERİ */
        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; margin-bottom: 6px; }
        .label-text { font-size: 11px; color: #94a3b8; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; }
        .value-badge { background: #0f172a; color: var(--accent); font-size: 11px; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-weight:bold; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); height: 6px; cursor: pointer; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; }
        .font-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 5px; outline: none; font-size: 13px; cursor: pointer; }
        
        .action-row { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .action-btn { flex: 1; background: #334155; color: white; border: none; border-radius: 6px; padding: 8px; font-size: 11px; font-weight: bold; cursor: pointer; text-align:center;}
        .action-btn:hover { background: #475569; }
        .action-btn.active { background: var(--accent); }
        .action-btn.danger { background: #991b1b; }
        .action-btn.special { background: #0284c7; }
        .action-btn.svg { background: #ea580c; }
        .action-btn.draw { background: #8b5cf6; }

        .group-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px solid #1e293b; margin-top: 10px; }

        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); text-align: center; padding: 10px; z-index: 11000; display: none; font-weight: bold; letter-spacing: 1px;}
        
        @media (max-width: 1023px) { 
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; border-top: 1px solid var(--border); border-left: none; order: 2; }
            #main-view { width: 100%; height: 50%; order: 1; }
            .floating-tools { bottom: auto; top: 10px; left: 50%; transform: translateX(-50%); }
            #layers-wrapper { height: 25%; }
        }
    </style>
</head>
<body>

<div id="status-info">İşlem Yapılıyor...</div>

<div id="login-screen">
    <div class="login-card">
        <h2>Studio Girişi</h2>
        <input type="password" id="passInput" placeholder="Sistem Şifresi">
        <button id="loginBtn">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div class="floating-tools">
            <button class="tool-btn" id="btn-undo" onclick="undo()" title="Geri Al (Ctrl+Z)">↩ Geri</button>
            <button class="tool-btn" id="btn-redo" onclick="redo()" title="İleri Al (Ctrl+Y)">İleri ↪</button>
            <div style="width: 1px; background: var(--border); margin: 0 5px;"></div>
            <button class="tool-btn" onclick="changeZoom(-0.1)">-</button>
            <button class="tool-btn" id="zoom-val" onclick="resetZoom()">100%</button>
            <button class="tool-btn" onclick="changeZoom(0.1)">+</button>
        </div>
        <div id="zoom-container">
            <div id="svg-wrapper">
                <div id="canvas-inner"></div>
                <svg id="control-layer"></svg>
            </div>
        </div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-nav">
            <div style="display:flex; gap:5px; margin-bottom: 10px;">
                <button id="saveBtn" class="action-btn active" style="flex:2; font-size:12px;">💾 KAYDET</button>
                <button onclick="downloadPNG()" class="action-btn special" style="flex:1;">📥 PNG</button>
                <button onclick="downloadSVG()" class="action-btn svg" style="flex:1;">📥 SVG</button>
            </div>

            <details style="margin-bottom: 10px;">
                <summary style="font-size:11px; font-weight:bold; color:var(--accent); cursor:pointer; margin-bottom:5px;">📐 TUVAL AYARLARI (GÖSTER)</summary>
                <div class="group-box" style="margin-top:5px;">
                    <div style="display:flex; gap:10px; align-items: center; margin-bottom:10px;">
                        <input type="number" id="canvas-w" placeholder="Genişlik" onchange="updateCanvasSize()">
                        <span style="color:#64748b;">X</span>
                        <input type="number" id="canvas-h" placeholder="Yükseklik" onchange="updateCanvasSize()">
                        <input type="color" id="canvas-bg-color" title="Arka Plan Rengi" oninput="updateCanvasBg()" style="width:40px; height:35px; cursor:pointer; border:none; background:none;">
                    </div>
                    <div class="action-row" style="margin:0;">
                        <button onclick="addGuide('h')" class="action-btn" style="background:#06b6d4;">+ YATAY KILAVUZ</button>
                        <button onclick="addGuide('v')" class="action-btn" style="background:#06b6d4;">+ DİKEY KILAVUZ</button>
                    </div>
                </div>
            </details>
            
            <div class="action-row" style="margin-bottom:5px;">
                <button id="addTextBtn" class="action-btn">+ YAZI</button>
                <button id="addImgBtn" class="action-btn">+ RESİM</button>
                <button onclick="addShape('rect')" class="action-btn">+ KARE</button>
            </div>
            <div class="action-row">
                <button onclick="addIcon('star')" class="action-btn">⭐ YILDIZ</button>
                <button onclick="addIcon('heart')" class="action-btn">❤️ KALP</button>
                <button id="btn-draw" onclick="toggleDrawMode()" class="action-btn draw">🖌️ ÇİZİM</button>
            </div>
            <input type="file" id="img-in" hidden>
        </div>

        <div id="layers-wrapper">
            <div id="layers-header">📑 KATMANLAR</div>
            <div id="layers-list"></div>
        </div>

        <div id="editor-fields">
            <div style="text-align:center; color:#64748b; margin-top:50px; font-style:italic; font-size:13px;">
                👆 Düzenlemek için sahneden veya katmanlardan bir nesne seçin.
            </div>
        </div>
    </div>
</div>

<script>
    // === DEĞİŞKENLER VE TEMEL AYARLAR ===
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev"; // GITHUB LİNKİNİZİ BURAYA YAZIN
    let SHA_KEY = "", SESSION_PASS = "";
    
    let selectedEl = null, resizingEl = null, rotatingEl = null, radiusingEl = null, activeHandle = null;
    let offset = {x:0, y:0}, startP = {x:0, y:0}, startData = {}, isModified = false;
    let clipboard = null;
    let currentZoom = 1; let historyStack = []; let historyIndex = -1;
    let isDrawingMode = false; let isDrawing = false; let currentPath = null; let pathData = "";
    let isDraggingGuide = false; let currentGuide = null;

    window.updateEditorUI = null;

    const googleFonts = [
        { name: "Varsayılan", val: "sans-serif" }, { name: "Roboto", val: "'Roboto', sans-serif" },
        { name: "Montserrat", val: "'Montserrat', sans-serif" }, { name: "Poppins", val: "'Poppins', sans-serif" },
        { name: "Open Sans", val: "'Open Sans', sans-serif" }, { name: "Lato", val: "'Lato', sans-serif" },
        { name: "Playfair Display", val: "'Playfair Display', serif" }, { name: "Pacifico", val: "'Pacifico', cursive" }
    ];

    const ICONS = {
        star: "M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z",
        heart: "M12 4.435c-1.989-5.399-12-4.597-12 3.568 0 4.068 3.06 9.481 12 14.997 8.94-5.516 12-10.929 12-14.997 0-8.118-10-8.999-12-3.568z"
    };

    // === GİRİŞ ===
    const login = async () => {
        const passVal = document.getElementById('passInput').value;
        if(!passVal) { alert("Şifre girin!"); return; }
        SESSION_PASS = passVal;
        
        // Giriş yaptıktan sonra sahte yükleme simülasyonu (Worker bağlandığında fetch yapılır)
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('app-container').style.display = "flex";
        
        // Yeni boş belge oluştur
        const svgHTML = `<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg"><rect id="canvas-background" x="0" y="0" width="1920" height="1080" fill="#ffffff"></rect><g id="guides-group"></g></svg>`;
        document.getElementById('canvas-inner').innerHTML = svgHTML;
        
        historyStack = []; historyIndex = -1;
        setTimeout(() => { setupLayers(); initCanvasSettings(); saveState(); }, 200);
    };
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('passInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });

    // === İNDİRME ===
    function hideGuides(hide) { const gg = document.getElementById('guides-group'); if(gg) gg.style.display = hide ? 'none' : 'block'; }
    
    function downloadPNG() {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return;
        document.getElementById('control-layer').innerHTML = ""; selectedEl = null; renderEditor();
        hideGuides(true);
        const svgData = new XMLSerializer().serializeToString(svg); const canvas = document.createElement("canvas"); const ctx = canvas.getContext("2d"); const img = new Image();
        img.onload = function() { canvas.width = svg.viewBox.baseVal.width || 1920; canvas.height = svg.viewBox.baseVal.height || 1080; ctx.drawImage(img, 0, 0); const a = document.createElement("a"); a.download = "tasarim.png"; a.href = canvas.toDataURL("image/png"); a.click(); hideGuides(false); };
        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
    }
    
    function downloadSVG() {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return;
        document.getElementById('control-layer').innerHTML = ""; selectedEl = null; renderEditor();
        hideGuides(true);
        const svgData = new XMLSerializer().serializeToString(svg);
        const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"}); const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.download = "tasarim_vektor.svg"; a.href = url; a.click();
        hideGuides(false);
    }

    // === TUVAL & KILAVUZ YÖNETİMİ ===
    function initCanvasSettings() {
        const svg = document.querySelector('#canvas-inner svg'); if (!svg) return; const vb = svg.viewBox.baseVal;
        document.getElementById('canvas-w').value = vb.width || 1920; document.getElementById('canvas-h').value = vb.height || 1080;
        let bgRect = svg.querySelector('#canvas-background');
        document.getElementById('canvas-bg-color').value = safeColor(bgRect.getAttribute("fill"));
    }
    window.updateCanvasSize = function() { const w = document.getElementById('canvas-w').value; const h = document.getElementById('canvas-h').value; const svg = document.querySelector('#canvas-inner svg'); svg.setAttribute("viewBox", `0 0 ${w} ${h}`); document.getElementById('control-layer').setAttribute("viewBox", `0 0 ${w} ${h}`); const bgRect = svg.querySelector('#canvas-background'); if(bgRect) { bgRect.setAttribute("width", w); bgRect.setAttribute("height", h); } saveState(); };
    window.updateCanvasBg = function() { const col = document.getElementById('canvas-bg-color').value; const bgRect = document.querySelector('#canvas-background'); if(bgRect) bgRect.setAttribute("fill", col); saveState(); };

    window.addGuide = function(type) {
        const svg = document.querySelector('#canvas-inner svg'); const vb = svg.viewBox.baseVal;
        const gg = document.getElementById('guides-group'); if(!gg) return;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.classList.add("guide-line"); line.dataset.type = type;
        if(type === 'h') { line.setAttribute("x1", 0); line.setAttribute("y1", vb.height/2); line.setAttribute("x2", vb.width); line.setAttribute("y2", vb.height/2); line.style.cursor = "row-resize"; }
        else { line.setAttribute("x1", vb.width/2); line.setAttribute("y1", 0); line.setAttribute("x2", vb.width/2); line.setAttribute("y2", vb.height); line.style.cursor = "col-resize"; }
        line.ondblclick = function() { this.remove(); saveState(); };
        gg.appendChild(line); saveState();
    }

    // === SERBEST ÇİZİM MODU ===
    window.toggleDrawMode = function() {
        isDrawingMode = !isDrawingMode;
        document.getElementById('btn-draw').classList.toggle('active', isDrawingMode);
        document.getElementById('svg-wrapper').classList.toggle('draw-mode', isDrawingMode);
        selectedEl = null; document.getElementById('control-layer').innerHTML = ""; renderEditor();
    }

    // === HAZIR STİLLER & HİZALAMA ===
    window.applyTextStyle = function(id, style) {
        const el = document.getElementById(id); if(!el) return;
        const color = el.dataset.solidColor || el.getAttribute('fill') || '#ffffff';
        el.setAttribute('fill', color); el.setAttribute('stroke', 'none'); el.setAttribute('paint-order', 'stroke fill');
        el.dataset.shadowX = 0; el.dataset.shadowY = 0; el.dataset.shadowBlur = 0;
        
        if (style === 'hollow') { el.setAttribute('fill', 'none'); el.setAttribute('stroke', color); el.setAttribute('stroke-width', '4'); } 
        else if (style === 'neon') { el.setAttribute('fill', '#ffffff'); el.setAttribute('stroke', color); el.setAttribute('stroke-width', '2'); el.dataset.shadowColor = color; el.dataset.shadowX = 0; el.dataset.shadowY = 0; el.dataset.shadowBlur = 15; } 
        else if (style === '3d') { el.setAttribute('fill', color); el.setAttribute('stroke', '#000000'); el.setAttribute('stroke-width', '3'); el.dataset.shadowColor = '#000000'; el.dataset.shadowX = 6; el.dataset.shadowY = 6; el.dataset.shadowBlur = 0; }
        window.applyFilters(el); saveState(); renderEditor();
    }

    window.alignElement = function(id, type) {
        const el = document.getElementById(id); if(!el) return; const svg = document.querySelector('#canvas-inner svg'); const vb = svg.viewBox.baseVal; const bbox = el.getBBox();
        if (el.tagName === 'text') { if(type === 'center-h') el.setAttribute('x', vb.width/2); if(type === 'center-v') el.setAttribute('y', vb.height/2); if(type === 'left') el.setAttribute('x', bbox.width/2); if(type === 'right') el.setAttribute('x', vb.width - bbox.width/2); } 
        else { let nw = parseFloat(el.getAttribute('width')) || bbox.width; let nh = parseFloat(el.getAttribute('height')) || bbox.height; if(type === 'center-h') el.setAttribute('x', (vb.width/2) - (nw/2)); if(type === 'center-v') el.setAttribute('y', (vb.height/2) - (nh/2)); if(type === 'left') el.setAttribute('x', 0); if(type === 'right') el.setAttribute('x', vb.width - nw); } 
        if(el.tagName === 'image' || el.tagName === 'rect') window.applyShapeMask(el); saveState(); if(window.updateEditorUI) window.updateEditorUI(el);
    };

    window.toggleFlip = function(id, dir) { const el = document.getElementById(id); if(!el) return; if(dir === 'x') el.dataset.flipX = (el.dataset.flipX === "-1") ? "1" : "-1"; else el.dataset.flipY = (el.dataset.flipY === "-1") ? "1" : "-1"; window.applyTransforms(el); saveState(); }
    window.applyTransforms = function(el) {
        const bbox = el.getBBox(); let cx = 0, cy = 0;
        if(el.tagName === 'text') { cx = parseFloat(el.getAttribute('x')); cy = parseFloat(el.getAttribute('y')); } else { cx = (parseFloat(el.getAttribute('x')) || 0) + (parseFloat(el.getAttribute('width')) || 0) / 2; cy = (parseFloat(el.getAttribute('y')) || 0) + (parseFloat(el.getAttribute('height')) || 0) / 2; }
        const angle = parseFloat(el.dataset.angle) || 0; const fx = parseFloat(el.dataset.flipX) || 1; const fy = parseFloat(el.dataset.flipY) || 1;
        el.setAttribute("transform", `rotate(${angle} ${cx} ${cy}) translate(${cx} ${cy}) scale(${fx} ${fy}) translate(${-cx} ${-cy})`);
        if(window.updateEditorUI) window.updateEditorUI(el);
    }

    // === KLAVYE KISAYOLLARI ===
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; } if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); return; }
        if (selectedEl && selectedEl.dataset.locked !== "true") {
            const step = e.shiftKey ? 10 : 1; let moved = false; let x = parseFloat(selectedEl.getAttribute("x")) || 0, y = parseFloat(selectedEl.getAttribute("y")) || 0;
            if (e.key === 'ArrowUp') { y -= step; moved = true; } if (e.key === 'ArrowDown') { y += step; moved = true; } if (e.key === 'ArrowLeft') { x -= step; moved = true; } if (e.key === 'ArrowRight') { x += step; moved = true; }
            if (moved) { e.preventDefault(); selectedEl.setAttribute("x", x); selectedEl.setAttribute("y", y); if(selectedEl.tagName === 'image' || selectedEl.tagName === 'rect') window.applyShapeMask(selectedEl); if(selectedEl.tagName === 'text') window.applyTextCurve(selectedEl); if(window.updateEditorUI) window.updateEditorUI(selectedEl); isModified = true; }
            if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); selectedEl.remove(); document.getElementById('control-layer').innerHTML = ''; selectedEl = null; saveState(); renderEditor(); }
            if (e.ctrlKey && e.key === 'c') { e.preventDefault(); clipboard = selectedEl.cloneNode(true); }
        }

                <span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; ${isLocked ? 'text-decoration:line-through; opacity:0.5;' : ''}">${typeName}</span>
                <div class="layer-actions">
                    <button class="layer-btn" onclick="moveLayer('${el.id}', 1)" title="Yukarı Taşı">▲</button>
                    <button class="layer-btn" onclick="moveLayer('${el.id}', -1)" title="Aşağı Taşı">▼</button>
                    <button class="layer-btn" onclick="toggleLock('${el.id}')" title="Kilitle/Aç">${isLocked ? '🔒' : '🔓'}</button>
                    <button class="layer-btn" style="color:#ef4444;" onclick="if(confirm('Silinecek?')){ const delId='${el.id}'; if(selectedEl && selectedEl.id===delId) selectedEl=null; document.getElementById(delId).remove(); saveState(); renderEditor(); document.getElementById('control-layer').innerHTML=''; event.stopPropagation(); }">×</button>
                </div>
            `;
            list.appendChild(item);
        });
    }

    function syncSliders(el) {
        if (el !== selectedEl) return;
        if (el.tagName === 'text') { const fs = parseFloat(el.dataset.baseFontSize) || 60; const slider = document.getElementById(`fs-slider`); if(slider) slider.value = fs; const badge = document.getElementById(`val-fs`); if(badge) badge.innerText = Math.round(fs) + "px"; } 
        else if (el.tagName !== 'path') {
            const w = Math.round(parseFloat(el.getAttribute("width"))); const h = Math.round(parseFloat(el.getAttribute("height"))); const rx = Math.round(parseFloat(el.dataset.rx) || 0); 
            const ws = document.getElementById(`w-slider`), hs = document.getElementById(`h-slider`), rs = document.getElementById(`r-slider`);
            if(ws) { ws.value = w; document.getElementById(`val-w`).innerText = w + "px"; } if(hs) { hs.value = h; document.getElementById(`val-h`).innerText = h + "px"; } if(rs) { rs.value = rx; rs.max = Math.min(w/2, h/2); document.getElementById(`val-r`).innerText = rx + "px"; }
        }
    }

    function renderProperties() {
        const f = document.getElementById('editor-fields');
        if (!selectedEl) {
            f.innerHTML = `<div style="text-align:center; color:#64748b; margin-top:50px; font-style:italic; font-size:13px;">👆 Düzenlemek için sahneden veya katmanlardan bir nesne seçin.</div>`;
            return;
        }

        const el = selectedEl;
        f.innerHTML = "";
        
        const isLocked = el.dataset.locked === "true"; const blend = el.dataset.blend || 'normal';
        const col = el.getAttribute('fill') === 'none' ? el.getAttribute('stroke') : (el.dataset.solidColor || el.getAttribute('fill') || "#ffffff"); 
        let opacityVal = parseFloat(el.getAttribute('opacity')); if (isNaN(opacityVal)) opacityVal = 1;
        const sX = parseFloat(el.dataset.shadowX) || 0, sY = parseFloat(el.dataset.shadowY) || 0, sB = parseFloat(el.dataset.shadowBlur) || 0, sC = el.dataset.shadowColor || '#000000', bl = parseFloat(el.dataset.blur) || 0;
        const strokeCol = el.getAttribute('stroke') || '#000000'; const strokeW = parseFloat(el.getAttribute('stroke-width')) || 0;

        let typeName = el.tagName.toUpperCase(); if (typeName === 'RECT') typeName = 'ŞEKİL'; if (typeName === 'SVG') typeName = 'İKON'; if (typeName === 'PATH') typeName = 'ÇİZİM';

        let html = `<div style="font-size:12px; color:var(--accent); font-weight:bold; margin-bottom:10px; border-bottom:1px solid #334155; padding-bottom:5px;">${typeName} ÖZELLİKLERİ ${isLocked ? '🔒' : ''}</div>`;

        html += `<div class="action-row" style="margin-bottom:10px;"><button class="action-btn special" onclick="cloneElement('${el.id}')" ${isLocked ? 'disabled':''}>⧉ KOPYASINI OLUŞTUR</button></div>`;
        
        if(el.tagName !== 'path') {
            html += `<div class="action-row" style="margin-bottom:2px;"><button class="action-btn" onclick="alignElement('${el.id}', 'left')">⬅️ SOL</button><button class="action-btn" onclick="alignElement('${el.id}', 'center-h')">🎯 ORTA</button><button class="action-btn" onclick="alignElement('${el.id}', 'right')">SAĞ ➡️</button></div>`;
            if(el.tagName !== 'text') { html += `<div class="action-row"><button class="action-btn" onclick="toggleFlip('${el.id}', 'x')" ${isLocked ? 'disabled' : ''}>↔️ YATAY ÇEVİR</button><button class="action-btn" onclick="toggleFlip('${el.id}', 'y')" ${isLocked ? 'disabled' : ''}>↕️ DİKEY ÇEVİR</button></div>`; }
        }

        if (el.tagName === 'text') {
            const fs = parseFloat(el.dataset.baseFontSize) || 60; const mw = parseFloat(el.dataset.maxWidth) || 0; const ls = parseFloat(el.getAttribute("letter-spacing")) || 0; const currentFont = el.getAttribute("font-family") || "sans-serif"; const curve = parseFloat(el.dataset.curve) || 0;
            const rawText = el.dataset.rawText || el.textContent;
            let fontOptions = googleFonts.map(font => `<option value="${font.val}" style="font-family: ${font.val}" ${currentFont.includes(font.name) ? "selected" : ""}>${font.name}</option>`).join('');

            html += `<input type="text" value="${rawText}" oninput="const t=document.getElementById('${el.id}'); t.dataset.rawText=this.value; window.applyTextCurve(t); if(window.updateEditorUI) window.updateEditorUI(t);" onchange="saveState()" ${isLocked ? 'disabled' : ''}>`;
            html += `<div class="label-text" style="color:var(--accent); margin:10px 0 5px 0;">✨ HAZIR STİLLER</div><div class="action-row"><button class="action-btn" onclick="applyTextStyle('${el.id}', 'normal')" ${isLocked?'disabled':''}>Temizle</button><button class="action-btn" onclick="applyTextStyle('${el.id}', 'neon')" ${isLocked?'disabled':''}>Neon</button><button class="action-btn" onclick="applyTextStyle('${el.id}', '3d')" ${isLocked?'disabled':''}>Retro 3D</button><button class="action-btn" onclick="applyTextStyle('${el.id}', 'hollow')" ${isLocked?'disabled':''}>Hollow</button></div>`;
            html += `<select class="font-select" onchange="const t=document.getElementById('${el.id}'); t.setAttribute('font-family', this.value); t.style.fontFamily=this.value; window.applyTextCurve(t); saveState(); if(window.updateEditorUI) window.updateEditorUI(t);" ${isLocked ? 'disabled' : ''}>${fontOptions}</select>`;
            html += `<div class="label-row"><span class="label-text">ANA YAZI BOYUTU</span><span class="value-badge" id="val-fs">${Math.round(fs)}px</span></div><input type="range" id="fs-slider" min="10" max="600" value="${fs}" oninput="const t=document.getElementById('${el.id}'); t.dataset.baseFontSize=this.value; window.applyTextCurve(t); document.getElementById('val-fs').innerText=Math.round(this.value)+'px'; if(window.updateEditorUI) window.updateEditorUI(t);" onchange="saveState()" ${isLocked ? 'disabled' : ''}>`;
            html += `<div class="label-row"><span class="label-text">KAVİS (CURVE)</span><span class="value-badge" id="val-cv">${curve}</span></div><input type="range" min="-100" max="100" value="${curve}" oninput="const t=document.getElementById('${el.id}'); t.dataset.curve=this.value; document.getElementById('val-cv').innerText=this.value; window.applyTextCurve(t); if(window.updateEditorUI) window.updateEditorUI(t);" onchange="saveState()" ${isLocked ? 'disabled' : ''}>`;
            html += `<div class="label-row"><span class="label-text">HARF ARALIĞI</span><span class="value-badge" id="val-ls">${ls}px</span></div><input type="range" min="-10" max="50" value="${ls}" oninput="const t=document.getElementById('${el.id}'); t.setAttribute('letter-spacing', this.value); document.getElementById('val-ls').innerText=this.value+'px'; window.applyTextCurve(t); if(window.updateEditorUI) window.updateEditorUI(t);" onchange="saveState()" ${isLocked ? 'disabled' : ''}>`;
            html += `<div class="label-row"><span class="label-text">SIĞDIRMA (MAX GENİŞLİK)</span><span class="value-badge" id="val-mw">${mw === 0 ? 'KAPALI' : mw + 'px'}</span></div><input type="range" id="mw-slider" min="0" max="1500" value="${mw}" oninput="const t=document.getElementById('${el.id}'); t.dataset.maxWidth=this.value; window.applyTextCurve(t); document.getElementById('val-mw').innerText=this.value == 0 ? 'KAPALI' : this.value+'px'; if(window.updateEditorUI) window.updateEditorUI(t);" onchange="saveState()" ${isLocked ? 'disabled' : ''}>`;
        } else if (el.tagName !== 'path') {
            const w = parseFloat(el.getAttribute("width")) || 200, h = parseFloat(el.getAttribute("height")) || 200; const rx = parseFloat(el.dataset.rx) || 0, sm = parseFloat(el.dataset.smoothing) || 0.5; const maskShape = el.dataset.maskShape || 'squircle';
            html += `<div class="label-row"><span class="label-text">GENİŞLİK</span><span class="value-badge" id="val-w">${Math.round(w)}px</span></div><input type="range" id="w-slider" min="10" max="3000" value="${w}" oninput="const img=document.getElementById('${el.id}'); img.setAttribute('width', this.value); window.applyShapeMask(img); document.getElementById('val-w').innerText=Math.round(this.value)+'px'; if(window.updateEditorUI) window.updateEditorUI(img);" onchange="saveState()" ${isLocked ? 'disabled' : ''}>`;
            html += `<div class="label-row"><span class="label-text">YÜKSEKLİK</span><span class="value-badge" id="val-h">${Math.round(h)}px</span></div><input type="range" id="h-slider" min="10" max="3000" value="${h}" oninput="const img=document.getElementById('${el.id}'); img.setAttribute('height', this.value); window.applyShapeMask(img); document.getElementById('val-h').innerText=Math.round(this.value)+'px'; if(window.updateEditorUI) window.updateEditorUI(img);" onchange="saveState()" ${isLocked ? 'disabled' : ''}>`;
            if (el.tagName === 'rect' || el.tagName === 'image') {
                html += `
                    <div class="label-row"><span class="label-text">MASKE (ŞEKİL)</span></div>
                    <select class="font-select" onchange="const img=document.getElementById('${el.id}'); img.dataset.maskShape=this.value; window.applyShapeMask(img); saveState(); if(window.updateEditorUI) window.updateEditorUI(img);" ${isLocked ? 'disabled' : ''}>
                        <option value="squircle" ${maskShape === 'squircle' ? 'selected' : ''}>Oval Kare (Squircle)</option>
                        <option value="circle" ${maskShape === 'circle' ? 'selected' : ''}>Daire</option>
                        <option value="triangle" ${maskShape === 'triangle' ? 'selected' : ''}>Üçgen</option>
                        <option value="star" ${maskShape === 'star' ? 'selected' : ''}>Yıldız</option>
                    </select>
                    <div class="label-row"><span class="label-text">KÖŞE YARIÇAPI (Squircle)</span><span class="value-badge" id="val-r">${Math.round(rx)}px</span></div><input type="range" id="r-slider" min="0" max="${Math.min(w/2, h/2)}" value="${rx}" oninput="const img=document.getElementById('${el.id}'); img.dataset.rx=this.value; window.applyShapeMask(img); document.getElementById('val-r').innerText=Math.round(this.value)+'px'; if(window.updateEditorUI) window.updateEditorUI(img);" onchange="saveState()" ${isLocked ? 'disabled' : ''}>
                `;
            }
        }

        if (el.tagName === 'text' || el.tagName === 'rect' || el.tagName === 'svg' || el.tagName === 'path') {
            const dash = el.getAttribute('stroke-dasharray') || 'none';
            html += `
                <div class="group-box">
                    <div class="label-text" style="color:var(--accent); margin-bottom:10px;">🔲 DIŞ KENARLIK / ÇİZGİ</div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="color" value="${safeColor(strokeCol)}" oninput="const t=document.getElementById('${el.id}'); t.setAttribute('stroke', this.value); t.setAttribute('paint-order', 'stroke fill'); t.setAttribute('stroke-linejoin', 'round');" onchange="saveState()" style="width:35px; height:35px; border-radius:8px; border:none; background:none; cursor:pointer;" ${isLocked ? 'disabled' : ''}>
                        <div style="flex:1;">
                            <div class="label-row" style="margin-top:0;"><span class="label-text">KALINLIK</span><span class="value-badge" id="val-sw">${strokeW}px</span></div>
                            <input type="range" min="0" max="100" value="${strokeW}" oninput="const t=document.getElementById('${el.id}'); t.setAttribute('stroke-width', this.value); t.setAttribute('paint-order', 'stroke fill'); t.setAttribute('stroke-linejoin', 'round'); document.getElementById('val-sw').innerText=this.value+'px';" onchange="saveState()" ${isLocked ? 'disabled' : ''}>
                        </div>
                    </div>
                    <select class="font-select" style="margin-top:10px;" onchange="document.getElementById('${el.id}').setAttribute('stroke-dasharray', this.value); saveState();" ${isLocked ? 'disabled' : ''}><option value="none" ${dash === 'none' ? 'selected' : ''}>Düz Çizgi</option><option value="5,5" ${dash === '5,5' ? 'selected' : ''}>Kesikli (İnce)</option><option value="15,10" ${dash === '15,10' ? 'selected' : ''}>Kesikli (Kalın)</option></select>
                </div>
            `;
        }

        html += `
            <div class="group-box">
                <div class="label-row"><span class="label-text">KARIŞIM MODU (BLEND)</span></div>
                <select class="font-select" onchange="const t=document.getElementById('${el.id}'); t.dataset.blend=this.value; window.applyFilters(t); saveState();" ${isLocked ? 'disabled' : ''}>
                    <option value="normal" ${blend === 'normal' ? 'selected' : ''}>Normal</option><option value="multiply" ${blend === 'multiply' ? 'selected' : ''}>Çoğalt (Multiply)</option><option value="screen" ${blend === 'screen' ? 'selected' : ''}>Ekran (Screen)</option><option value="overlay" ${blend === 'overlay' ? 'selected' : ''}>Kaplama (Overlay)</option>
                </select>
                <div style="display:flex; gap:10px; margin-bottom: 10px; margin-top: 10px;">
                    <div><div class="label-text" style="margin-bottom:5px;">${el.tagName==='path'?'ÇİZGİ':'İÇ'} RENK</div><input type="color" value="${safeColor(col)}" oninput="const t=document.getElementById('${el.id}'); if(t.tagName==='path') { t.setAttribute('stroke', this.value); } else { t.dataset.solidColor=this.value; t.setAttribute('fill', this.value); t.style.fill=this.value; }" onchange="saveState()" style="width:35px; height:35px; border-radius:8px; border:none; background:none; cursor:pointer;" ${isLocked ? 'disabled' : ''}></div>
                    ${el.tagName !== 'path' ? `<div><div class="label-text" style="margin-bottom:5px;">GÖLGE</div><input type="color" value="${sC}" oninput="const t=document.getElementById('${el.id}'); t.dataset.shadowColor=this.value; window.applyFilters(t);" onchange="saveState()" style="width:35px; height:35px; border-radius:8px; border:none; background:none; cursor:pointer;" ${isLocked ? 'disabled' : ''}></div>` : ''}
                    <div style="flex:1;"><div class="label-row" style="margin-top:0;"><span class="label-text">ŞEFFAFLIK</span><span class="value-badge" id="val-op">${Math.round(opacityVal*100)}%</span></div><input type="range" min="0" max="1" step="0.05" value="${opacityVal}" oninput="const t=document.getElementById('${el.id}'); t.setAttribute('opacity', this.value); document.getElementById('val-op').innerText=Math.round(this.value*100)+'%';" onchange="saveState()" ${isLocked ? 'disabled' : ''}></div>
                </div>
        `;
        if (el.tagName !== 'path') {
            html += `<div style="display:flex; gap:10px; margin-top: 15px;"><div style="flex:1;"><div class="label-row" style="margin-top:0;"><span class="label-text">GÖLGE X</span><span class="value-badge" id="val-sx">${sX}</span></div><input type="range" min="-50" max="50" value="${sX}" oninput="const t=document.getElementById('${el.id}'); t.dataset.shadowX=this.value; window.applyFilters(t); document.getElementById('val-sx').innerText=this.value;" onchange="saveState()" ${isLocked ? 'disabled' : ''}></div><div style="flex:1;"><div class="label-row" style="margin-top:0;"><span class="label-text">GÖLGE Y</span><span class="value-badge" id="val-sy">${sY}</span></div><input type="range" min="-50" max="50" value="${sY}" oninput="const t=document.getElementById('${el.id}'); t.dataset.shadowY=this.value; window.applyFilters(t); document.getElementById('val-sy').innerText=this.value;" onchange="saveState()" ${isLocked ? 'disabled' : ''}></div></div>
                     <div style="display:flex; gap:10px; margin-top: 5px;"><div style="flex:1;"><div class="label-row" style="margin-top:0;"><span class="label-text">GÖLGE BLUR</span><span class="value-badge" id="val-sb">${sB}</span></div><input type="range" min="0" max="50" value="${sB}" oninput="const t=document.getElementById('${el.id}'); t.dataset.shadowBlur=this.value; window.applyFilters(t); document.getElementById('val-sb').innerText=this.value;" onchange="saveState()" ${isLocked ? 'disabled' : ''}></div><div style="flex:1;"><div class="label-row" style="margin-top:0;"><span class="label-text">ÖĞE BLUR</span><span class="value-badge" id="val-bl">${bl}</span></div><input type="range" min="0" max="50" value="${bl}" oninput="const t=document.getElementById('${el.id}'); t.dataset.blur=this.value; window.applyFilters(t); document.getElementById('val-bl').innerText=this.value;" onchange="saveState()" ${isLocked ? 'disabled' : ''}></div></div>
                     <button class="action-btn danger" style="width:100%; margin-top:10px;" onclick="const t=document.getElementById('${el.id}'); t.dataset.shadowX=0; t.dataset.shadowY=0; t.dataset.shadowBlur=0; t.dataset.blur=0; window.applyFilters(t); saveState(); renderEditor();" ${isLocked ? 'disabled' : ''}>🚫 GÖLGE/EFEKT SIFIRLA</button>`;
        }
        html += `</div>`;
        f.innerHTML = html;
    }

    // === EKLEME FONKSİYONLARI ===
    document.getElementById('saveBtn').onclick = saveData;
    document.getElementById('addTextBtn').onclick = addNewText;
    document.getElementById('addImgBtn').onclick = () => document.getElementById('img-in').click();
    document.getElementById('img-in').onchange = (e) => addNewImage(e.target);

    function addNewText() {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return; const vb = svg.viewBox.baseVal; const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.id = "txt_" + Date.now(); t.setAttribute("class", "duzenlenebilir"); t.setAttribute("x", vb.width ? vb.width/2 : 500); t.setAttribute("y", vb.height ? vb.height/2 : 500); 
        t.setAttribute("text-anchor", "middle"); t.setAttribute("dominant-baseline", "central"); t.dataset.baseFontSize = "80"; t.dataset.maxWidth = "600"; t.dataset.rawText = "YENİ METİN";
        t.dataset.solidColor = "#000000"; t.setAttribute("fill", "#000000"); t.setAttribute("font-size", "80"); t.setAttribute("font-family", "sans-serif"); t.textContent = "YENİ METİN";
        svg.appendChild(t); selectedEl = t; saveState(); setupLayers(false); window.updateEditorUI(t);
    }
    function addNewImage(input) {
        const file = input.files[0]; if(!file) return; const reader = new FileReader();
        reader.onload = (e) => {
            const svg = document.querySelector('#canvas-inner svg'); const vb = svg.viewBox.baseVal; const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
            img.id = "img_" + Date.now(); img.setAttribute("class", "duzenlenebilir"); img.setAttribute("x", vb.width ? (vb.width/2)-150 : 100); img.setAttribute("y", vb.height ? (vb.height/2)-150 : 100); img.setAttribute("width", 300); img.setAttribute("height", 300); img.dataset.rx = "0"; img.dataset.smoothing = "0.5"; img.dataset.maskShape = "squircle"; img.setAttributeNS("http://www.w3.org/1999/xlink", "href", e.target.result);
            svg.appendChild(img); selectedEl = img; saveState(); setupLayers(false); window.updateEditorUI(img);
        }; reader.readAsDataURL(file);
    }
    window.addShape = function(type) {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return; const vb = svg.viewBox.baseVal; const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.id = "shp_" + Date.now(); rect.setAttribute("class", "duzenlenebilir"); rect.setAttribute("x", vb.width ? (vb.width/2)-100 : 100); rect.setAttribute("y", vb.height ? (vb.height/2)-100 : 100); rect.setAttribute("width", 200); rect.setAttribute("height", 200); rect.dataset.solidColor = "#10b981"; rect.setAttribute("fill", "#10b981"); rect.dataset.maskShape = "squircle";
        svg.appendChild(rect); window.applyShapeMask(rect); selectedEl = rect; saveState(); setupLayers(false); window.updateEditorUI(rect);
    }
    window.addIcon = function(type) {
        const svg = document.querySelector('#canvas-inner svg'); if(!svg) return; const vb = svg.viewBox.baseVal; const iconSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        iconSvg.id = "icn_" + Date.now(); iconSvg.setAttribute("class", "duzenlenebilir"); iconSvg.setAttribute("x", vb.width ? (vb.width/2)-50 : 100); iconSvg.setAttribute("y", vb.height ? (vb.height/2)-50 : 100); iconSvg.setAttribute("width", 100); iconSvg.setAttribute("height", 100); iconSvg.setAttribute("viewBox", "0 0 24 24"); iconSvg.dataset.solidColor = "#ec4899"; iconSvg.setAttribute("fill", "#ec4899");
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path"); path.setAttribute("d", ICONS[type]); iconSvg.appendChild(path); svg.appendChild(iconSvg); selectedEl = iconSvg; saveState(); setupLayers(false); window.updateEditorUI(iconSvg);
    }

    async function saveData() {
        const st = document.getElementById('status-info'); st.innerText = "KAYDEDİLİYOR..."; st.style.display = "block";
        try {
            document.getElementById('control-layer').innerHTML = ""; 
            hideGuides(true);
            localStorage.removeItem("autosave_" + document.getElementById('file-selector').value);
            const svgText = new XMLSerializer().serializeToString(document.querySelector('#canvas-inner svg')); const b64 = btoa(unescape(encodeURIComponent(svgText)));
            hideGuides(false);
            await fetch(WORKER_URL, { method: "PUT", headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": document.getElementById('file-selector').value}, body: JSON.stringify({message: "Layer Panel Update", content: b64, sha: SHA_KEY}) });
            st.innerText = "BAŞARIYLA KAYDEDİLDİ!"; setTimeout(() => st.style.display="none", 2000);
        } catch(e) { alert("Hata!"); st.style.display="none"; }
    }
</script>
